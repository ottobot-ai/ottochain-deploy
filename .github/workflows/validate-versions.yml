name: Validate Versions

on:
  pull_request:
    paths:
      - 'versions.yaml'
      - 'compatibility.yaml'

jobs:
  validate:
    name: Validate Compatibility
    runs-on: ubuntu-latest
    outputs:
      metagraph_bumped: ${{ steps.detect.outputs.metagraph_bumped }}
      pr_version: ${{ steps.detect.outputs.pr_version }}
      base_version: ${{ steps.detect.outputs.base_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup yq
        uses: mikefarah/yq@v4

      - name: Validate versions.yaml structure
        run: |
          echo "📋 Validating versions.yaml structure..."
          
          # Check required fields exist
          if ! yq -e '.components' versions.yaml > /dev/null 2>&1; then
            echo "❌ Missing 'components' in versions.yaml"
            exit 1
          fi
          
          # Check all components have versions
          for comp in ottochain services explorer watchdog; do
            VERSION=$(yq ".components.$comp.version // \"\"" versions.yaml)
            if [ -z "$VERSION" ]; then
              echo "❌ Missing version for $comp"
              exit 1
            fi
            echo "✅ $comp: $VERSION"
          done

      - name: Check compatibility matrix
        id: compat
        run: |
          echo "🔍 Checking full compatibility matrix..."
          
          ERRORS=""
          WARNINGS=""
          
          # For each component with requirements
          for COMP in $(yq '.components | keys | .[]' compatibility.yaml); do
            REQUIRES=$(yq ".components.$COMP.requires // {}" compatibility.yaml)
            
            if [ "$REQUIRES" = "{}" ] || [ "$REQUIRES" = "null" ]; then
              continue
            fi
            
            COMP_VERSION=$(yq ".components.$COMP.version" versions.yaml)
            echo "Checking $COMP ($COMP_VERSION) dependencies..."
            
            # Check each dependency
            for DEP in $(yq ".components.$COMP.requires | keys | .[]" compatibility.yaml 2>/dev/null || echo ""); do
              RANGE=$(yq ".components.$COMP.requires.$DEP" compatibility.yaml)
              DEP_VERSION=$(yq ".components.$DEP.version" versions.yaml)
              
              echo "  → $DEP: need $RANGE, have $DEP_VERSION"
              
              # Use semver CLI for proper range checking
              if ! pnpm exec semver -r "$RANGE" "$DEP_VERSION" > /dev/null 2>&1; then
                ERRORS="$ERRORS\n❌ $COMP requires $DEP $RANGE but versions.yaml has $DEP_VERSION"
              fi
            done
          done
          
          if [ -n "$ERRORS" ]; then
            echo -e "\n$ERRORS"
            echo "has_errors=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo ""
            echo "✅ All compatibility checks passed!"
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify artifacts exist
        id: artifacts
        run: |
          echo "📦 Verifying artifacts exist..."
          ERRORS=""
          
          # Check GitHub releases
          OTTO_VERSION=$(yq '.components.ottochain.version' versions.yaml)
          echo "Checking ottochain v$OTTO_VERSION..."
          if gh release view "v$OTTO_VERSION" -R scasplte2/ottochain > /dev/null 2>&1; then
            echo "✅ ottochain v$OTTO_VERSION release exists"
          else
            echo "⚠️ ottochain v$OTTO_VERSION release not found (may be pending)"
          fi
          
          # Check Docker images in GHCR
          check_ghcr_image() {
            local IMAGE=$1
            local VERSION=$2
            local ORG=$(echo $IMAGE | cut -d'/' -f2)
            local NAME=$(echo $IMAGE | cut -d'/' -f3)
            
            # Query GHCR via GitHub API for package versions
            # ottobot-ai is a user account, not an org — try both endpoints
            if gh api "users/$ORG/packages/container/$NAME/versions" \
                --jq ".[].metadata.container.tags[]" 2>/dev/null | grep -q "^v\?$VERSION$"; then
              echo "✅ $IMAGE:$VERSION exists in GHCR"
              return 0
            else
              echo "❌ $IMAGE:$VERSION NOT FOUND in GHCR"
              return 1
            fi
          }
          
          # Check services image
          SERVICES_VERSION=$(yq '.components.services.version' versions.yaml)
          SERVICES_IMAGE=$(yq '.components.services.image' versions.yaml)
          if [ -n "$SERVICES_IMAGE" ]; then
            echo "Checking $SERVICES_IMAGE:$SERVICES_VERSION..."
            if ! check_ghcr_image "$SERVICES_IMAGE" "$SERVICES_VERSION"; then
              ERRORS="$ERRORS\n❌ services v$SERVICES_VERSION image not found in GHCR"
            fi
          fi
          
          # Check explorer image
          EXPLORER_VERSION=$(yq '.components.explorer.version' versions.yaml)
          EXPLORER_IMAGE=$(yq '.components.explorer.image // ""' versions.yaml)
          if [ -n "$EXPLORER_IMAGE" ]; then
            echo "Checking $EXPLORER_IMAGE:$EXPLORER_VERSION..."
            if ! check_ghcr_image "$EXPLORER_IMAGE" "$EXPLORER_VERSION"; then
              ERRORS="$ERRORS\n❌ explorer v$EXPLORER_VERSION image not found in GHCR"
            fi
          fi
          
          if [ -n "$ERRORS" ]; then
            echo -e "\n$ERRORS"
            echo "has_errors=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo ""
            echo "✅ All artifact checks passed!"
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect metagraph version bump
        id: detect
        run: |
          # Check if ottochain version changed in this PR vs. base branch
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:versions.yaml 2>/dev/null \
            | yq '.components.ottochain.version' || echo "")
          PR_VERSION=$(yq '.components.ottochain.version' versions.yaml)

          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "pr_version=${PR_VERSION}" >> $GITHUB_OUTPUT

          if [ -n "$BASE_VERSION" ] && [ "$BASE_VERSION" != "$PR_VERSION" ]; then
            echo "metagraph_bumped=true" >> $GITHUB_OUTPUT
            echo "🔄 Metagraph version bump detected: ${BASE_VERSION} → ${PR_VERSION}"
          else
            echo "metagraph_bumped=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No metagraph version bump in this PR"
          fi

      - name: Summary
        run: |
          echo "## 🔍 Version Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Current Versions" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`yaml" >> $GITHUB_STEP_SUMMARY
          yq '.components' versions.yaml >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.compat.outputs.has_errors }}" = "true" ] || [ "${{ steps.artifacts.outputs.has_errors }}" = "true" ]; then
            echo "### ❌ Validation Errors Found" >> $GITHUB_STEP_SUMMARY
            echo "Please review the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ All Checks Passed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.detect.outputs.metagraph_bumped }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🧪 Compatibility Check" >> $GITHUB_STEP_SUMMARY
            echo "Metagraph bump detected: \`${{ steps.detect.outputs.base_version }}\` → \`${{ steps.detect.outputs.pr_version }}\`" >> $GITHUB_STEP_SUMMARY
            echo "Real integration test dispatched — see the **compatibility-check** job below." >> $GITHUB_STEP_SUMMARY
          fi

  compatibility-dispatch:
    name: Dispatch Compatibility Check
    runs-on: ubuntu-latest
    needs: validate
    # Only run when a metagraph version bump is detected in this PR
    if: needs.validate.outputs.metagraph_bumped == 'true'

    # ── Auth note ───────────────────────────────────────────────────────
    # Dispatching workflow_dispatch to another repo requires a token with
    # actions:write scope on ottobot-ai/ottochain-services.
    # The built-in GITHUB_TOKEN only has write on THIS repo (ottochain-deploy).
    #
    # Setup: Add RELEASE_TOKEN secret to ottochain-deploy repo.
    # The token must have: actions:write + actions:read on ottochain-services.
    # Contact @scasplte2 to provision via GitHub App or fine-grained PAT.
    #
    # If RELEASE_TOKEN is not configured, this job will be skipped with a
    # warning (the validate job still runs normally).
    permissions:
      statuses: write
      pull-requests: read

    steps:
      - name: Check RELEASE_TOKEN availability
        id: token-check
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "⚠️ RELEASE_TOKEN not configured — skipping cross-repo dispatch"
            echo "To enable real compatibility testing:"
            echo "  1. Create a GitHub App or fine-grained PAT with actions:write on ottochain-services"
            echo "  2. Add it as RELEASE_TOKEN secret in ottochain-deploy repo settings"
            echo "available=false" >> $GITHUB_OUTPUT
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch compatibility-check to services
        id: dispatch
        if: steps.token-check.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          METAGRAPH_VERSION: ${{ needs.validate.outputs.pr_version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "🚀 Dispatching compatibility check: services@main ↔ metagraph v${METAGRAPH_VERSION}"

          # Dispatch workflow_dispatch to services compatibility-check.yml
          RESPONSE=$(gh api repos/ottobot-ai/ottochain-services/actions/workflows/compatibility-check.yml/dispatches \
            --method POST \
            --field "ref=main" \
            --field "inputs[metagraph_version]=${METAGRAPH_VERSION}" \
            --field "inputs[deploy_pr_number]=${PR_NUMBER}" \
            --field "inputs[deploy_repo]=ottobot-ai/ottochain-deploy" \
            2>&1) || {
              echo "❌ Dispatch failed: $RESPONSE"
              exit 1
            }

          # Wait for the run to appear (retry loop to handle GitHub API lag)
          RUN_ID=""
          for attempt in 1 2 3; do
            sleep $((attempt * 2))
            RUN_ID=$(gh api "repos/ottobot-ai/ottochain-services/actions/runs?event=workflow_dispatch&branch=main" \
              --jq ".workflow_runs | map(select(.name == \"Compatibility Check\")) | sort_by(.created_at) | last | .id" 2>/dev/null || echo "")
            [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ] && break
            echo "  Attempt $attempt: run not yet visible, retrying..."
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "⚠️ Could not capture run ID — dispatch may have worked but poll skipped"
            echo "run_id=" >> $GITHUB_OUTPUT
          else
            echo "✓ Dispatched run: https://github.com/ottobot-ai/ottochain-services/actions/runs/${RUN_ID}"
            echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          fi

      - name: Poll compatibility check result
        if: steps.token-check.outputs.available == 'true' && steps.dispatch.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
          METAGRAPH_VERSION: ${{ needs.validate.outputs.pr_version }}
        run: |
          echo "⏳ Polling services compatibility-check run ${RUN_ID}..."
          echo "   (timeout: 50 minutes)"

          # Poll every 60s, timeout after 50m (well within GitHub's 6h job limit)
          MAX_POLLS=50
          for i in $(seq 1 $MAX_POLLS); do
            RUN_DATA=$(gh api "repos/ottobot-ai/ottochain-services/actions/runs/${RUN_ID}" \
              --jq '{status: .status, conclusion: (.conclusion // "")}' 2>/dev/null || echo '{"status":"error","conclusion":""}')
            STATUS=$(echo "$RUN_DATA" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion')

            echo "  Poll ${i}/${MAX_POLLS}: status=${STATUS} conclusion=${CONCLUSION}"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo ""
                echo "✅ COMPATIBLE: services@main works with metagraph v${METAGRAPH_VERSION}"
                echo "   Run: https://github.com/ottobot-ai/ottochain-services/actions/runs/${RUN_ID}"
                exit 0
              else
                echo ""
                echo "❌ INCOMPATIBLE: services@main FAILED against metagraph v${METAGRAPH_VERSION}"
                echo "   Conclusion: ${CONCLUSION}"
                echo "   Run: https://github.com/ottobot-ai/ottochain-services/actions/runs/${RUN_ID}"
                echo ""
                echo "This PR introduces a breaking change. Do not merge until services is updated."
                exit 1
              fi
            fi

            if [ $i -eq $MAX_POLLS ]; then
              echo "⚠️ Timed out waiting for compatibility check (50m)"
              echo "   Check manually: https://github.com/ottobot-ai/ottochain-services/actions/runs/${RUN_ID}"
              exit 1
            fi

            sleep 60
          done

      - name: Summary (no token)
        if: steps.token-check.outputs.available != 'true'
        run: |
          echo "## ⚠️ Compatibility Check Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Metagraph version bump from \`${{ needs.validate.outputs.base_version }}\` → \`${{ needs.validate.outputs.pr_version }}\` detected," >> $GITHUB_STEP_SUMMARY
          echo "but **RELEASE_TOKEN** is not configured in this repo." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To enable real integration testing on metagraph bumps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Create a GitHub App or fine-grained PAT with \`actions:write\` on \`ottobot-ai/ottochain-services\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Add it as the \`RELEASE_TOKEN\` secret in \`ottobot-ai/ottochain-deploy\` repo settings" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See \`COMPATIBILITY-TESTING.md\` for full setup instructions." >> $GITHUB_STEP_SUMMARY
