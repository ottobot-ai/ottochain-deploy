name: Deploy — Development (Orchestrated)

on:
  workflow_dispatch:
    inputs:
      tessellation_version:
        description: 'Tessellation version'
        required: true
        default: 'v2.8.0'
      skip_build:
        description: 'Skip JAR build'
        type: boolean
        default: false
      run_tests:
        description: 'Run post-deployment tests'
        type: boolean
        default: true
  push:
    branches:
      - develop

permissions:
  contents: read
  actions: write

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          hetzner_ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          services_ip: ${{ secrets.HETZNER_SERVICES_IP }}

      - name: Plan deployment
        uses: ./.github/actions/plan-deployment
        with:
          environment: development
          branch_name: ${{ github.ref_name }}

  build:
    name: Build
    needs: preflight
    uses: ./.github/workflows/reusable-jar-build.yml
    with:
      environment: development
      tessellation_version: ${{ inputs.tessellation_version || 'v2.8.0' }}
      skip_build: ${{ inputs.skip_build || false }}
    secrets: inherit

  deploy:
    name: Deploy Cluster
    needs: build
    uses: ./.github/workflows/reusable-cluster-deployment.yml
    with:
      environment: development
      deployment_strategy: rolling
      jars_artifact_name: ${{ needs.build.outputs.jars_artifact_name || 'jars' }}
    secrets: inherit

  deploy-services:
    name: Deploy Services
    needs: deploy
    uses: ./.github/workflows/reusable-services-deployment.yml
    with:
      environment: development
      service_type: all
      version: ${{ inputs.tessellation_version || 'latest' }}
    secrets: inherit

  test:
    name: Post-Deploy Tests
    needs: [deploy, deploy-services]
    if: ${{ inputs.run_tests != false }}
    uses: ./.github/workflows/reusable-post-deployment-tests.yml
    with:
      environment: development
      test_suite: smoke
      bridge_url: http://localhost:3030
      ml0_url: http://localhost:9200
    secrets: inherit
