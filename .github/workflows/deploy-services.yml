name: Deploy Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'scratch'
        type: choice
        options:
          - scratch
          - beta
          - staging
          - prod
      services_version:
        description: 'Services image version (default: latest)'
        required: false
        default: 'latest'
        type: string
      explorer_version:
        description: 'Explorer image version (default: latest)'
        required: false
        default: 'latest'
        type: string
      reset_db:
        description: 'Reset database and Redis'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      services_version:
        required: false
        type: string
        default: 'latest'
      explorer_version:
        required: false
        type: string
        default: 'latest'
      reset_db:
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy Services Stack
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout (needed for composite actions)
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          services_ip: ${{ secrets.HETZNER_SERVICES_IP }}
          hosts: nodes-and-services

      - name: GHCR login on services server
        uses: ./.github/actions/docker-login-pull
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          image: ghcr.io/ottobot-ai/ottochain-services
          hosts: services
          pull: 'false'

      - name: Prepare remote directory
        run: |
          ssh services "mkdir -p /opt/ottochain-services"

      - name: Write docker-compose.yml
        run: |
          ssh services "cat > /opt/ottochain-services/docker-compose.yml" << 'COMPOSE_EOF'
          # OttoChain Services Stack (unified)
          # Includes: application services, monitoring, watchdog
          # Auto-generated by deploy-services.yml - DO NOT EDIT ON SERVER

          services:

            # ============================================================
            # Application Services
            # ============================================================

            gateway:
              image: ghcr.io/ottobot-ai/ottochain-services:${SERVICES_VERSION:-latest}
              container_name: gateway
              restart: unless-stopped
              ports:
                - "4000:4000"
              environment:
                - SERVICE=gateway
                - NODE_ENV=production
                - DATABASE_URL=${DATABASE_URL}
                - METAGRAPH_ML0_URL=${METAGRAPH_ML0_URL}
                - METAGRAPH_DL1_URL=${METAGRAPH_DL1_URL}
                - METAGRAPH_DL1_URLS=${METAGRAPH_DL1_URLS}
                - GL0_URL=${GL0_URL}
                - METAGRAPH_ID=${METAGRAPH_ID}
                - REDIS_URL=${REDIS_URL:-redis://redis:6379}
              depends_on:
                - redis
              networks:
                - ottochain
              healthcheck:
                test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
                interval: 30s
                timeout: 10s
                retries: 3

            bridge:
              image: ghcr.io/ottobot-ai/ottochain-services:${SERVICES_VERSION:-latest}
              container_name: bridge
              restart: unless-stopped
              ports:
                - "3030:3030"
              environment:
                - SERVICE=bridge
                - NODE_ENV=production
                - DATABASE_URL=${DATABASE_URL}
                - METAGRAPH_ML0_URL=${METAGRAPH_ML0_URL}
                - METAGRAPH_DL1_URL=${METAGRAPH_DL1_URL}
                - METAGRAPH_DL1_URLS=${METAGRAPH_DL1_URLS}
                - GL0_URL=${GL0_URL}
                - METAGRAPH_ID=${METAGRAPH_ID}
                - REDIS_URL=${REDIS_URL:-redis://redis:6379}
              depends_on:
                - redis
              networks:
                - ottochain
              healthcheck:
                test: ["CMD-SHELL", "curl -sf http://localhost:3030/health || exit 1"]
                interval: 30s
                timeout: 10s
                retries: 3

            indexer:
              image: ghcr.io/ottobot-ai/ottochain-services:${SERVICES_VERSION:-latest}
              container_name: indexer
              restart: unless-stopped
              ports:
                - "3031:3031"
              environment:
                - SERVICE=indexer
                - NODE_ENV=production
                - DATABASE_URL=${DATABASE_URL}
                - METAGRAPH_ML0_URL=${METAGRAPH_ML0_URL}
                - METAGRAPH_DL1_URL=${METAGRAPH_DL1_URL}
                - METAGRAPH_DL1_URLS=${METAGRAPH_DL1_URLS}
                - GL0_URL=${GL0_URL}
                - METAGRAPH_ID=${METAGRAPH_ID}
                - REDIS_URL=${REDIS_URL:-redis://redis:6379}
                - INDEXER_PORT=3031
                - INDEXER_CALLBACK_URL=${INDEXER_CALLBACK_URL:-http://indexer:3031/webhook/snapshot}
              depends_on:
                - postgres
                - redis
              networks:
                - ottochain
              healthcheck:
                test: ["CMD-SHELL", "curl -sf http://localhost:3031/health || exit 1"]
                interval: 30s
                timeout: 10s
                retries: 3

            status:
              image: ghcr.io/ottobot-ai/ottochain-services:${SERVICES_VERSION:-latest}
              container_name: status
              restart: unless-stopped
              ports:
                - "3032:3032"
              environment:
                - SERVICE=monitor
                - NODE_ENV=production
                - MONITOR_AUTH=false
                - GL0_URLS=${GL0_URLS}
                - ML0_URLS=${ML0_URLS}
                - DL1_URLS=${DL1_URLS}
                - BRIDGE_URL=http://bridge:3030
                - GATEWAY_URL=http://gateway:4000
                - DATABASE_URL=${DATABASE_URL}
                - METAGRAPH_ID=${METAGRAPH_ID}
                - REDIS_URL=${REDIS_URL:-redis://redis:6379}
                - TRAFFIC_GEN_URL=http://traffic-gen:3033
                - INDEXER_URL=http://indexer:3031
                - EXPLORER_URL=http://explorer:80
              depends_on:
                - redis
              networks:
                - ottochain
              healthcheck:
                test: ["CMD-SHELL", "curl -sf http://localhost:3032/health || exit 1"]
                interval: 30s
                timeout: 10s
                retries: 3

            traffic-gen:
              image: ghcr.io/ottobot-ai/ottochain-services:${SERVICES_VERSION:-latest}
              container_name: traffic-gen
              restart: unless-stopped
              environment:
                - SERVICE=traffic-generator
                - NODE_ENV=production
                - BRIDGE_URL=http://bridge:3030
                - METAGRAPH_ML0_URL=${METAGRAPH_ML0_URL}
                - ML0_URL=${METAGRAPH_ML0_URL}
                - METAGRAPH_DL1_URL=${METAGRAPH_DL1_URL}
                - METAGRAPH_DL1_URLS=${METAGRAPH_DL1_URLS}
                - GL0_URL=${GL0_URL}
                - INDEXER_URL=http://indexer:3031
                - TRAFFIC_INTERVAL=${TRAFFIC_INTERVAL:-5000}
                - TRAFFIC_BATCH_SIZE=${TRAFFIC_BATCH_SIZE:-3}
              depends_on:
                - bridge
                - indexer
              networks:
                - ottochain

            explorer:
              image: ghcr.io/ottobot-ai/ottochain-explorer:${EXPLORER_VERSION:-latest}
              container_name: explorer
              restart: unless-stopped
              ports:
                - "8081:80"
              networks:
                - ottochain
              healthcheck:
                test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
                interval: 30s
                timeout: 10s
                retries: 3

            # ============================================================
            # Data Stores
            # ============================================================

            postgres:
              image: postgres:16-alpine
              container_name: postgres
              restart: unless-stopped
              ports:
                - "127.0.0.1:5432:5432"
              environment:
                - POSTGRES_USER=${POSTGRES_USER:-ottochain}
                - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ottochain}
                - POSTGRES_DB=${POSTGRES_DB:-ottochain}
              volumes:
                - postgres_data:/var/lib/postgresql/data
              networks:
                - ottochain
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ottochain}"]
                interval: 10s
                timeout: 5s
                retries: 5

            redis:
              image: redis:7-alpine
              container_name: redis
              restart: unless-stopped
              ports:
                - "127.0.0.1:6379:6379"
              volumes:
                - redis_data:/data
              networks:
                - ottochain
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 5s
                retries: 5

            # ============================================================
            # Watchdog — cluster health monitoring + automated restart
            # ============================================================

            watchdog:
              image: ghcr.io/ottobot-ai/ottochain-watchdog:latest
              container_name: watchdog
              restart: unless-stopped
              environment:
                - NODE_IPS=${NODE_IPS}
                - NODE_NAMES=${NODE_NAMES}
                - SSH_USER=${SSH_USER:-root}
                - SSH_KEY_PATH=/home/watchdog/.ssh/id_rsa
                - SNAPSHOT_STALL_MINUTES=${SNAPSHOT_STALL_MINUTES:-4}
                - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-60}
                - RESTART_COOLDOWN_MINUTES=${RESTART_COOLDOWN_MINUTES:-10}
                - MAX_RESTARTS_PER_HOUR=${MAX_RESTARTS_PER_HOUR:-6}
                - MANAGED_LAYERS=${MANAGED_LAYERS:-gl0,ml0,dl1}
                - MAX_CONSECUTIVE_FAILURES=${MAX_CONSECUTIVE_FAILURES:-3}
                - DATABASE_URL=${DATABASE_URL}
                - GL0_URLS=${GL0_URLS}
                - ML0_URLS=${ML0_URLS}
                - DL1_URLS=${DL1_URLS}
                - SERVICES_NODE_IP=${SERVICES_NODE_IP}
                - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
                - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
              volumes:
                - watchdog_ssh:/home/watchdog/.ssh:ro
              depends_on:
                - postgres
              networks:
                - ottochain

            # ============================================================
            # Observability — metrics, logs, alerting, dashboards
            # ============================================================

            prometheus:
              image: prom/prometheus:v2.50.0
              container_name: prometheus
              restart: unless-stopped
              ports:
                - "9090:9090"
              volumes:
                - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                - ./prometheus/alert_rules:/etc/prometheus/alert_rules:ro
                - ./prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
                - prometheus_data:/prometheus
              command:
                - '--config.file=/etc/prometheus/prometheus.yml'
                - '--storage.tsdb.path=/prometheus'
                - '--storage.tsdb.retention.time=30d'
                - '--web.enable-lifecycle'
                - '--web.enable-admin-api'
              depends_on:
                - alertmanager
              networks:
                - ottochain

            alertmanager:
              image: prom/alertmanager:v0.27.0
              container_name: alertmanager
              restart: unless-stopped
              ports:
                - "9093:9093"
              volumes:
                - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
                - alertmanager_data:/alertmanager
              command:
                - '--config.file=/etc/alertmanager/alertmanager.yml'
                - '--storage.path=/alertmanager'
              networks:
                - ottochain

            grafana:
              image: grafana/grafana:10.3.1
              container_name: grafana
              restart: unless-stopped
              ports:
                - "3001:3000"
              environment:
                - GF_SECURITY_ADMIN_USER=admin
                - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
                - GF_USERS_ALLOW_SIGN_UP=false
                - GF_ALERTING_ENABLED=false
                - GF_UNIFIED_ALERTING_ENABLED=true
              volumes:
                - grafana_data:/var/lib/grafana
                - ./grafana/provisioning:/etc/grafana/provisioning:ro
              depends_on:
                - prometheus
              networks:
                - ottochain

            loki:
              image: grafana/loki:2.9.4
              container_name: loki
              restart: unless-stopped
              user: "0"
              ports:
                - "3100:3100"
              volumes:
                - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
                - loki_data:/loki
              command: -config.file=/etc/loki/local-config.yaml
              networks:
                - ottochain

            promtail:
              image: grafana/promtail:2.9.4
              container_name: promtail
              restart: unless-stopped
              volumes:
                - /var/lib/docker/containers:/var/lib/docker/containers:ro
                - /var/run/docker.sock:/var/run/docker.sock:ro
                - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
              command: -config.file=/etc/promtail/config.yml
              depends_on:
                - loki
              networks:
                - ottochain

            # ============================================================
            # Exporters — Prometheus metric sources
            # ============================================================

            node-exporter:
              image: prom/node-exporter:latest
              container_name: node-exporter
              restart: unless-stopped
              ports:
                - "9100:9100"
              volumes:
                - /proc:/host/proc:ro
                - /sys:/host/sys:ro
                - /:/rootfs:ro
              command:
                - '--path.procfs=/host/proc'
                - '--path.sysfs=/host/sys'
                - '--path.rootfs=/rootfs'
              networks:
                - ottochain

            postgres-exporter:
              image: prometheuscommunity/postgres-exporter:latest
              container_name: postgres-exporter
              restart: unless-stopped
              ports:
                - "9187:9187"
              environment:
                - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-ottochain}:${POSTGRES_PASSWORD:-ottochain}@postgres:5432/ottochain?sslmode=disable
              depends_on:
                - postgres
              networks:
                - ottochain

            redis-exporter:
              image: oliver006/redis_exporter:latest
              container_name: redis-exporter
              restart: unless-stopped
              ports:
                - "9121:9121"
              environment:
                - REDIS_ADDR=redis://redis:6379
              depends_on:
                - redis
              networks:
                - ottochain

          networks:
            ottochain:
              driver: bridge

          volumes:
            postgres_data:
            redis_data:
            prometheus_data:
            grafana_data:
            alertmanager_data:
            loki_data:
            watchdog_ssh:
          COMPOSE_EOF

      - name: Write .env
        run: |
          METAGRAPH_IP="${{ secrets.HETZNER_NODE1_IP }}"
          NODE1_IP="${{ secrets.HETZNER_NODE1_IP }}"
          NODE2_IP="${{ secrets.HETZNER_NODE2_IP }}"
          NODE3_IP="${{ secrets.HETZNER_NODE3_IP }}"
          SERVICES_IP="${{ secrets.HETZNER_SERVICES_IP }}"
          SERVICES_VERSION="${{ inputs.services_version || 'latest' }}"
          EXPLORER_VERSION="${{ inputs.explorer_version || 'latest' }}"
          
          # Fetch metagraph ID from node1 (generated at metagraph build time)
          METAGRAPH_ID=$(ssh node1 "cat /opt/ottochain/genesis/genesis.address 2>/dev/null" || echo "")
          if [ -z "$METAGRAPH_ID" ]; then
            echo "⚠️ Could not fetch METAGRAPH_ID from node1, GL0 confirmations will be disabled"
          else
            echo "✓ Fetched METAGRAPH_ID: $METAGRAPH_ID"
          fi

          ssh services "cat > /opt/ottochain-services/.env" << ENVFILE
          # OttoChain Services Environment (unified)
          # Auto-generated by deploy-services.yml - DO NOT EDIT ON SERVER

          # Version pinning
          SERVICES_VERSION=${SERVICES_VERSION}
          EXPLORER_VERSION=${EXPLORER_VERSION}

          # Database
          DATABASE_URL=postgresql://ottochain:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/ottochain
          POSTGRES_USER=ottochain
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=ottochain

          # Redis
          REDIS_URL=redis://redis:6379

          # Metagraph identification
          METAGRAPH_ID=${METAGRAPH_ID}

          # Metagraph endpoints (singular — primary node)
          METAGRAPH_ML0_URL=http://${METAGRAPH_IP}:9200
          METAGRAPH_DL1_URL=http://${METAGRAPH_IP}:9400
          GL0_URL=http://${METAGRAPH_IP}:9000
          GL1_URL=http://${METAGRAPH_IP}:9100
          ML0_URL=http://${METAGRAPH_IP}:9200
          DL1_URL=http://${METAGRAPH_IP}:9400

          # Multi-node URLs (all 3 nodes — used by status page + watchdog)
          GL0_URLS=http://${NODE1_IP}:9000,http://${NODE2_IP}:9000,http://${NODE3_IP}:9000
          ML0_URLS=http://${NODE1_IP}:9200,http://${NODE2_IP}:9200,http://${NODE3_IP}:9200
          DL1_URLS=http://${NODE1_IP}:9400,http://${NODE2_IP}:9400,http://${NODE3_IP}:9400
          METAGRAPH_DL1_URLS=http://${NODE1_IP}:9400,http://${NODE2_IP}:9400,http://${NODE3_IP}:9400

          # Watchdog config
          NODE_IPS=${NODE1_IP},${NODE2_IP},${NODE3_IP}
          NODE_NAMES=node1,node2,node3
          SSH_USER=root
          SNAPSHOT_STALL_MINUTES=4
          HEALTH_CHECK_INTERVAL=60
          RESTART_COOLDOWN_MINUTES=10
          MAX_RESTARTS_PER_HOUR=6
          MANAGED_LAYERS=gl0,ml0,dl1
          MAX_CONSECUTIVE_FAILURES=3
          SERVICES_NODE_IP=${SERVICES_IP}

          # Grafana
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-ottochain}

          # Alerting
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          ENVFILE

      - name: Setup watchdog SSH key
        run: |
          ssh services << 'SSH_SETUP'
          # Create named volume for watchdog SSH key
          docker volume create watchdog_ssh 2>/dev/null || true
          
          # Copy SSH key into the volume via temp container
          VOLUME_PATH=$(docker volume inspect watchdog_ssh --format '{{ .Mountpoint }}')
          mkdir -p "$VOLUME_PATH"
          cp /root/.ssh/id_rsa "$VOLUME_PATH/id_rsa" 2>/dev/null || \
            cp /opt/ottochain-watchdog/ssh-key "$VOLUME_PATH/id_rsa" 2>/dev/null || \
            echo "⚠️ No SSH key found for watchdog — restart capability will be disabled"
          chmod 600 "$VOLUME_PATH/id_rsa" 2>/dev/null || true
          SSH_SETUP

      - name: Setup monitoring configs
        run: |
          NODE1_IP="${{ secrets.HETZNER_NODE1_IP }}"
          NODE2_IP="${{ secrets.HETZNER_NODE2_IP }}"
          NODE3_IP="${{ secrets.HETZNER_NODE3_IP }}"
          SERVICES_IP="${{ secrets.HETZNER_SERVICES_IP }}"

          ssh services "mkdir -p /opt/ottochain-services/{prometheus/alert_rules,alertmanager,grafana/provisioning/{datasources,dashboards},loki,promtail}"

          # Prometheus config
          ssh services "cat > /opt/ottochain-services/prometheus/prometheus.yml" << PROM_EOF
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          rule_files:
            - "alert_rules/*.yml"
            - "recording_rules.yml"

          alerting:
            alertmanagers:
              - static_configs:
                  - targets: ['alertmanager:9093']

          scrape_configs:
            - job_name: 'services-node'
              static_configs:
                - targets: ['node-exporter:9100']
                  labels:
                    node: 'services'

            - job_name: 'metagraph-nodes'
              static_configs:
                - targets: ['${NODE1_IP}:9100']
                  labels:
                    node: 'node1'
                - targets: ['${NODE2_IP}:9100']
                  labels:
                    node: 'node2'
                - targets: ['${NODE3_IP}:9100']
                  labels:
                    node: 'node3'

            - job_name: 'gl0'
              scrape_interval: 30s
              scrape_timeout: 10s
              static_configs:
                - targets: ['${NODE1_IP}:9000']
                  labels:
                    node: 'node1'
                - targets: ['${NODE2_IP}:9000']
                  labels:
                    node: 'node2'
                - targets: ['${NODE3_IP}:9000']
                  labels:
                    node: 'node3'

            - job_name: 'ml0'
              scrape_interval: 30s
              scrape_timeout: 10s
              static_configs:
                - targets: ['${NODE1_IP}:9200']
                  labels:
                    node: 'node1'
                - targets: ['${NODE2_IP}:9200']
                  labels:
                    node: 'node2'
                - targets: ['${NODE3_IP}:9200']
                  labels:
                    node: 'node3'

            - job_name: 'dl1'
              scrape_interval: 30s
              scrape_timeout: 10s
              static_configs:
                - targets: ['${NODE1_IP}:9400']
                  labels:
                    node: 'node1'
                - targets: ['${NODE2_IP}:9400']
                  labels:
                    node: 'node2'
                - targets: ['${NODE3_IP}:9400']
                  labels:
                    node: 'node3'

            - job_name: 'postgres'
              static_configs:
                - targets: ['postgres-exporter:9187']

            - job_name: 'redis'
              static_configs:
                - targets: ['redis-exporter:9121']
          PROM_EOF

          # Recording rules
          ssh services "cat > /opt/ottochain-services/prometheus/recording_rules.yml" << 'RULES_EOF'
          groups:
            - name: node_recording_rules
              rules:
                - record: node_memory_usage_percent
                  expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
                - record: node_cpu_usage_percent
                  expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
          RULES_EOF

          # Alert rules — nodes
          ssh services "cat > /opt/ottochain-services/prometheus/alert_rules/nodes.yml" << 'NODES_EOF'
          groups:
            - name: metagraph_nodes
              rules:
                - alert: NodeDown
                  expr: up{job=~"gl0|ml0|dl1"} == 0
                  for: 2m
                  labels:
                    severity: critical
                  annotations:
                    summary: "{{ $labels.job }} on {{ $labels.node }} is down"
                - alert: NodeHighHeapUsage
                  expr: jvm_memory_bytes_used{area="heap"} / jvm_memory_bytes_max{area="heap"} > 0.9
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High heap usage on {{ $labels.node }} {{ $labels.job }}"
                - alert: AllNodesDown
                  expr: count(up{job=~"gl0|ml0|dl1"} == 1) == 0
                  for: 1m
                  labels:
                    severity: critical
                  annotations:
                    summary: "All metagraph nodes are down"
          NODES_EOF

          # Alert rules — infrastructure
          ssh services "cat > /opt/ottochain-services/prometheus/alert_rules/infrastructure.yml" << 'INFRA_EOF'
          groups:
            - name: infrastructure
              rules:
                - alert: HighMemory
                  expr: node_memory_usage_percent > 90
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High memory on {{ $labels.node }} ({{ $value | printf \"%.1f\" }}%)"
                - alert: DiskLow
                  expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "Low disk on {{ $labels.node }} ({{ $value | printf \"%.1f\" }}% free)"
                - alert: HostDown
                  expr: up{job="metagraph-nodes"} == 0
                  for: 2m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Host {{ $labels.node }} is unreachable"
          INFRA_EOF

          # Alert rules — services
          ssh services "cat > /opt/ottochain-services/prometheus/alert_rules/services.yml" << 'SVC_EOF'
          groups:
            - name: services
              rules:
                - alert: PostgresDown
                  expr: pg_up == 0
                  for: 1m
                  labels:
                    severity: critical
                  annotations:
                    summary: "PostgreSQL is down"
                - alert: RedisDown
                  expr: redis_up == 0
                  for: 1m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Redis is down"
          SVC_EOF

          # Alertmanager config
          ssh services "cat > /opt/ottochain-services/alertmanager/alertmanager.yml" << ALERT_EOF
          global:
            resolve_timeout: 5m

          route:
            receiver: 'telegram'
            group_by: ['alertname', 'severity']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - match:
                  severity: critical
                receiver: 'telegram'
                repeat_interval: 1h

          receivers:
            - name: 'telegram'
              telegram_configs:
                - bot_token: '${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}'
                  chat_id: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
                  parse_mode: 'HTML'
                  message: |
                    🚨 <b>{{ .GroupLabels.alertname }}</b>
                    {{ range .Alerts }}
                    {{ .Annotations.summary }}
                    {{ end }}
          ALERT_EOF

          # Grafana datasources
          ssh services "cat > /opt/ottochain-services/grafana/provisioning/datasources/prometheus.yml" << 'DS_EOF'
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus:9090
              isDefault: true
            - name: Loki
              type: loki
              access: proxy
              url: http://loki:3100
          DS_EOF

          # Grafana dashboards config
          ssh services "cat > /opt/ottochain-services/grafana/provisioning/dashboards/dashboards.yml" << 'DASH_EOF'
          apiVersion: 1
          providers:
            - name: 'default'
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /etc/grafana/provisioning/dashboards/
                foldersFromFilesStructure: false
          DASH_EOF

          # Loki config
          ssh services "cat > /opt/ottochain-services/loki/loki-config.yml" << 'LOKI_EOF'
          auth_enabled: false

          server:
            http_listen_port: 3100

          ingester:
            lifecycler:
              ring:
                kvstore:
                  store: inmemory
                replication_factor: 1
            chunk_idle_period: 5m
            chunk_retain_period: 30s

          schema_config:
            configs:
              - from: 2020-10-24
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h

          storage_config:
            tsdb_shipper:
              active_index_directory: /loki/tsdb-index
              cache_location: /loki/tsdb-cache
            filesystem:
              directory: /loki/chunks

          limits_config:
            reject_old_samples: true
            reject_old_samples_max_age: 168h

          compactor:
            working_directory: /loki/compactor
            retention_enabled: true
            retention_delete_delay: 2h

          chunk_store_config:
            max_look_back_period: 168h
          LOKI_EOF

          # Promtail config (services node — reads Docker socket)
          ssh services "cat > /opt/ottochain-services/promtail/promtail-config.yml" << 'PROMTAIL_EOF'
          server:
            http_listen_port: 9080

          positions:
            filename: /tmp/positions.yaml

          clients:
            - url: http://loki:3100/loki/api/v1/push

          scrape_configs:
            - job_name: docker
              docker_sd_configs:
                - host: unix:///var/run/docker.sock
                  refresh_interval: 5s
              relabel_configs:
                - source_labels: ['__meta_docker_container_name']
                  regex: '/(.*)'
                  target_label: 'container'
                - source_labels: ['__meta_docker_container_log_stream']
                  target_label: 'logstream'
          PROMTAIL_EOF

      - name: Deploy stack
        run: |
          ssh services << 'DEPLOY_SCRIPT'
          cd /opt/ottochain-services
          
          # Stop PM2 if running (migration from old setup)
          pm2 stop all 2>/dev/null || true
          pm2 delete all 2>/dev/null || true
          
          # Remove old/stale containers that conflict with compose service names
          timeout 60 docker rm -f monitor health-monitor node-exporter redis-exporter postgres-exporter 2>/dev/null || true
          
          # Shut down old separate watchdog stack if it exists
          if [ -f /opt/ottochain-watchdog/docker-compose.yml ]; then
            cd /opt/ottochain-watchdog
            timeout 60 docker compose down --remove-orphans 2>/dev/null || true
            cd /opt/ottochain-services
          fi
          
          # Pull all images and deploy unified stack
          docker compose pull
          timeout 120 docker compose down --remove-orphans 2>/dev/null || true
          docker compose up -d --force-recreate
          
          # Wait for postgres/redis to be ready
          sleep 10
          DEPLOY_SCRIPT

      - name: Reset database and Redis
        if: ${{ inputs.reset_db == true }}
        run: |
          echo "Resetting database and Redis (wipe_state requested)..."
          ssh services << 'RESET_SCRIPT'
          # Flush Redis
          docker exec redis redis-cli FLUSHALL && echo "✓ Redis flushed"
          
          # Drop and recreate schema so prisma migrate deploy starts clean
          docker exec postgres psql -U ottochain -d ottochain -c "
            DROP SCHEMA public CASCADE;
            CREATE SCHEMA public;
          " && echo "✓ Postgres schema reset (clean slate for migrations)"
          RESET_SCRIPT
          
      - name: Run migrations and restart services
        run: |
          ssh services << 'MIGRATE_SCRIPT'
          cd /opt/ottochain-services
          
          # Restart services — container entrypoint runs prisma migrate deploy
          # On fresh DB (after reset): creates schema from migration files
          # On existing DB: applies any pending migrations
          docker compose restart gateway bridge indexer status || true
          
          # Wait for migrations to complete and services to be healthy
          sleep 15
          
          # Show status
          docker compose ps
          
          echo "✓ Services deployed and ready"
          MIGRATE_SCRIPT

      - name: Update nginx config
        run: |
          # Deploy main ottochain virtual host inline (simple, static config)
          ssh services << 'NGINX_SCRIPT'
          cat > /etc/nginx/sites-available/ottochain << 'NGINX_CONF'
          server {
              listen 8080;
              server_name _;

              location /graphql {
                  proxy_pass http://127.0.0.1:4000/graphql;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3030/;
              }

              location /webhook/ {
                  proxy_pass http://127.0.0.1:3031/;
              }

              location /status/ {
                  proxy_pass http://127.0.0.1:3032/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
              }

              location / {
                  proxy_pass http://127.0.0.1:8081;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
          NGINX_CONF

          ln -sf /etc/nginx/sites-available/ottochain /etc/nginx/sites-enabled/ottochain
          NGINX_SCRIPT

          # Deploy nginx snippets (scanner blocking, etc.)
          ssh services "mkdir -p /etc/nginx/snippets"
          scp nginx/snippets/*.conf services:/etc/nginx/snippets/ 2>/dev/null || true

          # Deploy all nginx configs from templates (with SSL)
          for site in bridge.ottochain.ai explorer.ottochain.ai status.ottochain.ai grafana.ottochain.ai prometheus.ottochain.ai; do
            if [ -f "nginx/${site}.conf" ]; then
              scp nginx/${site}.conf services:/etc/nginx/sites-available/${site}
              ssh services "ln -sf /etc/nginx/sites-available/${site} /etc/nginx/sites-enabled/${site}"
            fi
          done
          # Remove old default config
          ssh services "rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/default.bak" || true
          ssh services "nginx -t && nginx -s reload"

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 30

          echo "Checking services health..."
          FAILED=0

          for service in gateway bridge indexer status; do
            case $service in
              gateway) port=4000 ;; bridge) port=3030 ;; indexer) port=3031 ;; status) port=3032 ;;
            esac
            status_code=$(ssh services "curl -sf -o /dev/null -w '%{http_code}' http://localhost:$port/health" || echo "000")
            if [ "$status_code" = "200" ]; then
              echo "✅ $service: healthy"
            else
              echo "⚠️ $service: HTTP $status_code"
              if [ "$service" = "gateway" ] || [ "$service" = "bridge" ]; then
                FAILED=1
              fi
            fi
          done

          # Check explorer
          explorer_status=$(ssh services "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8081" || echo "000")
          if [ "$explorer_status" = "200" ]; then
            echo "✅ explorer: healthy"
          else
            echo "⚠️ explorer: HTTP $explorer_status"
          fi

          # Check watchdog is running
          watchdog_running=$(ssh services "docker inspect watchdog --format '{{.State.Status}}'" 2>/dev/null || echo "missing")
          if [ "$watchdog_running" = "running" ]; then
            echo "✅ watchdog: running"
          else
            echo "⚠️ watchdog: $watchdog_running"
          fi

          if [ $FAILED -eq 1 ]; then
            echo "❌ Critical services unhealthy — deploy failed"
            exit 1
          fi
          echo "✅ All critical services healthy"

      - name: Summary
        run: |
          echo "## 🚀 Services Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application Services" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Port | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for service in gateway bridge indexer status explorer traffic-gen; do
            case $service in
              gateway) port=4000 ;; bridge) port=3030 ;; indexer) port=3031 ;; status) port=3032 ;; explorer) port=8081 ;; traffic-gen) port="-" ;;
            esac
            if [ "$port" != "-" ]; then
              sc=$(ssh services "curl -sf -o /dev/null -w '%{http_code}' http://localhost:$port/health 2>/dev/null || curl -sf -o /dev/null -w '%{http_code}' http://localhost:$port" || echo "000")
              ICON="✅"; [ "$sc" != "200" ] && ICON="⚠️"
              echo "| $ICON $service | $port | HTTP $sc |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ➡️ $service | background | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Monitoring & Watchdog" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Port | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for comp in watchdog prometheus grafana loki alertmanager promtail; do
            status=$(ssh services "docker inspect $comp --format '{{.State.Status}}'" 2>/dev/null || echo "missing")
            ICON="✅"; [ "$status" != "running" ] && ICON="⚠️"
            case $comp in
              prometheus) port=9090 ;; grafana) port=3001 ;; loki) port=3100 ;; alertmanager) port=9093 ;; *) port="-" ;;
            esac
            echo "| $ICON $comp | $port | $status |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services Version**: \`${{ inputs.services_version || 'latest' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Explorer Version**: \`${{ inputs.explorer_version || 'latest' }}\`" >> $GITHUB_STEP_SUMMARY
