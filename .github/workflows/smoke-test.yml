name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'scratch'
        type: choice
        options:
          - scratch
          # - beta    # TODO: Add when beta environment ready
          # - staging # TODO: Add when staging environment ready
      traffic_duration:
        description: 'Traffic generation duration (seconds)'
        required: false
        default: '60'
        type: string
      skip_ui:
        description: 'Skip UI tests (faster)'
        required: false
        default: false
        type: boolean
  
  # Can be called after deploy
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      traffic_duration:
        required: false
        default: '60'
        type: string
      skip_ui:
        required: false
        default: false
        type: boolean
    outputs:
      passed:
        description: 'Whether smoke tests passed'
        value: ${{ jobs.results.outputs.passed }}

jobs:
  # ==========================================================================
  # API Smoke Tests
  # ==========================================================================
  api-tests:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.test.outputs.passed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        id: config
        env:
          # Infrastructure from JSON secret (preferred) or legacy individual secrets
          SCRATCH_INFRA: ${{ secrets.SCRATCH_INFRASTRUCTURE }}
          STAGING_INFRA: ${{ secrets.STAGING_INFRASTRUCTURE }}
          # Legacy fallback
          LEGACY_SERVICES_IP: ${{ secrets.HETZNER_SERVICES_IP }}
          LEGACY_NODE1_IP: ${{ secrets.HETZNER_NODE1_IP }}
        run: |
          ENV="${{ inputs.environment }}"
          
          # Try JSON infrastructure secret first, fall back to legacy
          case "$ENV" in
            scratch)
              INFRA_JSON="$SCRATCH_INFRA"
              ;;
            staging)
              INFRA_JSON="$STAGING_INFRA"
              ;;
            *)
              INFRA_JSON=""
              ;;
          esac
          
          if [ -n "$INFRA_JSON" ]; then
            # Parse JSON infrastructure secret
            SERVICES_IP=$(echo "$INFRA_JSON" | jq -r '.services_host')
            NODE1_IP=$(echo "$INFRA_JSON" | jq -r '.nodes[0].host')
            echo "Using JSON infrastructure secret for $ENV"
          elif [ -n "$LEGACY_SERVICES_IP" ] && [ -n "$LEGACY_NODE1_IP" ]; then
            # Fall back to legacy individual secrets
            SERVICES_IP="$LEGACY_SERVICES_IP"
            NODE1_IP="$LEGACY_NODE1_IP"
            echo "::warning::Using legacy individual secrets. Please migrate to ${ENV^^}_INFRASTRUCTURE JSON secret."
          else
            echo "::error::Missing infrastructure secrets. Set ${ENV^^}_INFRASTRUCTURE or legacy HETZNER_*_IP secrets."
            exit 1
          fi
          
          echo "bridge_url=http://${SERVICES_IP}:3030" >> $GITHUB_OUTPUT
          echo "indexer_url=http://${SERVICES_IP}:3031" >> $GITHUB_OUTPUT
          echo "gateway_url=http://${SERVICES_IP}:4000" >> $GITHUB_OUTPUT
          echo "explorer_url=http://${SERVICES_IP}:8080" >> $GITHUB_OUTPUT
          echo "ml0_url=http://${NODE1_IP}:9200" >> $GITHUB_OUTPUT

      - name: Run API smoke tests
        id: test
        env:
          BRIDGE_URL: ${{ steps.config.outputs.bridge_url }}
          INDEXER_URL: ${{ steps.config.outputs.indexer_url }}
          GATEWAY_URL: ${{ steps.config.outputs.gateway_url }}
          ML0_URL: ${{ steps.config.outputs.ml0_url }}
          TRAFFIC_DURATION: ${{ inputs.traffic_duration }}
        run: |
          chmod +x scripts/smoke-test.sh
          if ./scripts/smoke-test.sh; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  # ==========================================================================
  # UI Smoke Tests (Playwright)
  # ==========================================================================
  ui-tests:
    name: UI Smoke Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_ui != true }}
    outputs:
      passed: ${{ steps.test.outputs.passed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Load environment config
        id: config
        env:
          SCRATCH_INFRA: ${{ secrets.SCRATCH_INFRASTRUCTURE }}
          STAGING_INFRA: ${{ secrets.STAGING_INFRASTRUCTURE }}
          LEGACY_SERVICES_IP: ${{ secrets.HETZNER_SERVICES_IP }}
        run: |
          ENV="${{ inputs.environment }}"
          
          case "$ENV" in
            scratch)
              INFRA_JSON="$SCRATCH_INFRA"
              ;;
            staging)
              INFRA_JSON="$STAGING_INFRA"
              ;;
            *)
              echo "explorer_url=http://localhost:8080" >> $GITHUB_OUTPUT
              exit 0
              ;;
          esac
          
          if [ -n "$INFRA_JSON" ]; then
            SERVICES_IP=$(echo "$INFRA_JSON" | jq -r '.services_host')
          elif [ -n "$LEGACY_SERVICES_IP" ]; then
            SERVICES_IP="$LEGACY_SERVICES_IP"
          else
            echo "::error::Missing infrastructure secret for $ENV"
            exit 1
          fi
          
          echo "explorer_url=http://${SERVICES_IP}:8080" >> $GITHUB_OUTPUT

      - name: Run UI verification
        id: test
        env:
          EXPLORER_URL: ${{ steps.config.outputs.explorer_url }}
          SCREENSHOT_DIR: ./screenshots
        run: |
          if node scripts/verify-explorer-ui.js; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: explorer-screenshots
          path: screenshots/
          retention-days: 7

  # ==========================================================================
  # Aggregate Results
  # ==========================================================================
  results:
    name: Smoke Test Results
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    
    steps:
      - name: Check results
        id: check
        run: |
          API_PASSED="${{ needs.api-tests.outputs.passed }}"
          UI_PASSED="${{ needs.ui-tests.outputs.passed }}"
          UI_SKIPPED="${{ needs.ui-tests.result == 'skipped' }}"
          
          echo "API tests: $API_PASSED"
          echo "UI tests: $UI_PASSED (skipped: $UI_SKIPPED)"
          
          if [ "$API_PASSED" = "true" ]; then
            if [ "$UI_SKIPPED" = "true" ] || [ "$UI_PASSED" = "true" ]; then
              echo "passed=true" >> $GITHUB_OUTPUT
              echo "✅ All smoke tests passed!"
            else
              echo "passed=false" >> $GITHUB_OUTPUT
              echo "❌ UI tests failed"
              exit 1
            fi
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "❌ API tests failed"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🔥 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Tests | ${{ needs.ui-tests.result == 'skipped' && '⏭️ Skipped' || (needs.ui-tests.outputs.passed == 'true' && '✅ Passed' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall**: ${{ steps.check.outputs.passed == 'true' && '✅ PASSED' || '❌ FAILED' }}" >> $GITHUB_STEP_SUMMARY
