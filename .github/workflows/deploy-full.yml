name: Deploy Full Stack

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'scratch'
        type: choice
        options:
          - scratch
          - beta
          - staging
          - prod
      wipe_state:
        description: 'Wipe all state (genesis reset)'
        required: true
        default: 'false'
        type: boolean
      metagraph_version:
        description: 'Metagraph version (blank = versions.yaml)'
        required: false
        default: ''
        type: string
      services_version:
        description: 'Services version (blank = versions.yaml)'
        required: false
        default: ''
        type: string
      explorer_version:
        description: 'Explorer version (blank = versions.yaml)'
        required: false
        default: ''
        type: string
      skip_metagraph:
        description: 'Skip metagraph deployment'
        required: false
        default: false
        type: boolean
      skip_services:
        description: 'Skip services deployment'
        required: false
        default: false
        type: boolean
      skip_monitoring:
        description: 'Skip monitoring deployment'
        required: false
        default: false
        type: boolean
      enable_gl1:
        description: 'Enable GL1 (DAG L1) layer'
        required: false
        default: false
        type: boolean
      enable_cl1:
        description: 'Enable CL1 (Currency L1) layer'
        required: false
        default: false
        type: boolean

jobs:
  # Resolve versions from versions.yaml or inputs
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      metagraph_version: ${{ steps.versions.outputs.metagraph }}
      services_version: ${{ steps.versions.outputs.services }}
      explorer_version: ${{ steps.versions.outputs.explorer }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine environment
        id: env
        run: |
          ENV="${{ inputs.environment }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Deploying to: $ENV"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Resolve versions
        id: versions
        run: |
          INPUT_METAGRAPH="${{ inputs.metagraph_version }}"
          INPUT_SERVICES="${{ inputs.services_version }}"
          INPUT_EXPLORER="${{ inputs.explorer_version }}"

          # Read from versions.yaml
          YAML_METAGRAPH=$(yq '.components.ottochain.version' versions.yaml)
          YAML_SERVICES="v$(yq '.components.services.version' versions.yaml)"
          YAML_EXPLORER="v$(yq '.components.explorer.version' versions.yaml)"

          # Use input if provided, otherwise versions.yaml
          METAGRAPH="${INPUT_METAGRAPH:-$YAML_METAGRAPH}"
          SERVICES="${INPUT_SERVICES:-$YAML_SERVICES}"
          EXPLORER="${INPUT_EXPLORER:-$YAML_EXPLORER}"

          # Treat "latest" as versions.yaml too
          [ "$METAGRAPH" = "latest" ] && METAGRAPH="$YAML_METAGRAPH"
          [ "$SERVICES" = "latest" ] && SERVICES="$YAML_SERVICES"
          [ "$EXPLORER" = "latest" ] && EXPLORER="$YAML_EXPLORER"

          echo "metagraph=$METAGRAPH" >> $GITHUB_OUTPUT
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "explorer=$EXPLORER" >> $GITHUB_OUTPUT

          # Read all versions for the summary
          YAML_SDK=$(yq '.components.sdk.version' versions.yaml)
          YAML_WATCHDOG=$(yq '.components.watchdog.version' versions.yaml)
          YAML_TESS=$(yq '.components.tessellation.version' versions.yaml)
          YAML_POSTGRES=$(yq '.infra.postgres' versions.yaml)
          YAML_REDIS=$(yq '.infra.redis' versions.yaml)
          YAML_JAVA=$(yq '.infra.java' versions.yaml)
          YAML_PROMETHEUS=$(yq '.monitoring_tools.prometheus' versions.yaml)
          YAML_GRAFANA=$(yq '.monitoring_tools.grafana' versions.yaml)
          YAML_LOKI=$(yq '.monitoring_tools.loki' versions.yaml)

          echo "### Deploying Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Core Stack" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Version | Image / Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| OttoChain (metagraph) | \`$METAGRAPH\` | \`ghcr.io/scasplte2/ottochain-metagraph:$METAGRAPH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tessellation | \`$YAML_TESS\` | Constellation Labs |" >> $GITHUB_STEP_SUMMARY
          echo "| Services (bridge/indexer/gateway) | \`$SERVICES\` | \`ghcr.io/ottobot-ai/ottochain-services:$SERVICES\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Explorer | \`$EXPLORER\` | \`ghcr.io/ottobot-ai/ottochain-explorer:$EXPLORER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SDK | \`$YAML_SDK\` | \`@ottochain/sdk@$YAML_SDK\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Watchdog | \`$YAML_WATCHDOG\` | \`ghcr.io/ottobot-ai/ottochain-watchdog:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL | \`$YAML_POSTGRES\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Redis | \`$YAML_REDIS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Java | \`$YAML_JAVA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | \`$YAML_PROMETHEUS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | \`$YAML_GRAFANA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Loki | \`$YAML_LOKI\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Input Override" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Input | Resolved |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Metagraph | \`${INPUT_METAGRAPH:-<blank>}\` | \`$METAGRAPH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | \`${INPUT_SERVICES:-<blank>}\` | \`$SERVICES\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Explorer | \`${INPUT_EXPLORER:-<blank>}\` | \`$EXPLORER\` |" >> $GITHUB_STEP_SUMMARY

  # Deploy metagraph (5-layer cluster)
  metagraph:
    name: Metagraph
    needs: [setup]
    if: ${{ inputs.skip_metagraph != true }}
    uses: ./.github/workflows/deploy-metagraph.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      wipe_state: ${{ inputs.wipe_state == true }}
      image_tag: ${{ needs.setup.outputs.metagraph_version }}
      enable_gl1: ${{ inputs.enable_gl1 == true }}
      enable_cl1: ${{ inputs.enable_cl1 == true }}
    secrets: inherit

  # Deploy services (docker compose stack)
  services:
    name: Services
    needs: [setup, metagraph]
    if: always() && inputs.skip_services != true && (needs.metagraph.result == 'success' || needs.metagraph.result == 'skipped')
    uses: ./.github/workflows/deploy-services.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      services_version: ${{ needs.setup.outputs.services_version }}
      explorer_version: ${{ needs.setup.outputs.explorer_version }}
      reset_db: ${{ inputs.wipe_state == true }}
    secrets: inherit

  # Deploy monitoring (prometheus, grafana, alertmanager)
  monitoring:
    name: Monitoring
    needs: [setup, services]
    if: always() && inputs.skip_monitoring != true && (needs.services.result == 'success' || needs.services.result == 'skipped')
    uses: ./.github/workflows/deploy-watchdog.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      include_exporters: true
    secrets: inherit

  # Update deployed state on main via PR-safe method
  update-state:
    name: Update Deployed State
    runs-on: ubuntu-latest
    needs: [setup, metagraph, services, monitoring]
    if: always() && (needs.metagraph.result == 'success' || needs.services.result == 'success')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update deployed versions
        env:
          TARGET_ENV: ${{ needs.setup.outputs.environment }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          yq -i ".deployed.${TARGET_ENV}.ottochain = \"${{ needs.setup.outputs.metagraph_version }}\"" versions.yaml
          yq -i ".deployed.${TARGET_ENV}.services = \"${{ needs.setup.outputs.services_version }}\"" versions.yaml
          yq -i ".deployed.${TARGET_ENV}.explorer = \"${{ needs.setup.outputs.explorer_version }}\"" versions.yaml
          yq -i ".deployed.${TARGET_ENV}.timestamp = \"$TIMESTAMP\"" versions.yaml
          yq -i ".deployed.${TARGET_ENV}.workflow_run = \"${{ github.run_id }}\"" versions.yaml

          echo "Updated deployed.$TARGET_ENV:"
          yq ".deployed.${TARGET_ENV}" versions.yaml

      - name: Create PR with deployed state
        env:
          TARGET_ENV: ${{ needs.setup.outputs.environment }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="deploy-state/${TARGET_ENV}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit -m "chore: update deployed.${TARGET_ENV} state [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update deployed.${TARGET_ENV} state" \
            --body "Auto-generated by [Deploy Full Stack run #${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          **Deployed versions (${TARGET_ENV}):**
          - Metagraph: \`${{ needs.setup.outputs.metagraph_version }}\`
          - Services: \`${{ needs.setup.outputs.services_version }}\`
          - Explorer: \`${{ needs.setup.outputs.explorer_version }}\`"

  # Final summary
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [setup, metagraph, services, monitoring, update-state]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Generate summary
        run: |
          echo "## 🚀 Full Stack Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Wipe State**: ${{ inputs.wipe_state }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Metagraph | \`${{ needs.setup.outputs.metagraph_version }}\` | ${{ needs.metagraph.result == 'success' && '✅' || needs.metagraph.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | \`${{ needs.setup.outputs.services_version }}\` | ${{ needs.services.result == 'success' && '✅' || needs.services.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Watchdog | \`$(yq '.components.watchdog.version' versions.yaml)\` | ${{ needs.monitoring.result == 'success' && '✅' || needs.monitoring.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| State Update | — | ${{ needs.update-state.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Infrastructure Versions" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tessellation | \`$(yq '.components.tessellation.version' versions.yaml)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SDK | \`$(yq '.components.sdk.version' versions.yaml)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL | \`$(yq '.infra.postgres' versions.yaml)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Redis | \`$(yq '.infra.redis' versions.yaml)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Java | \`$(yq '.infra.java' versions.yaml)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | \`$(yq '.monitoring_tools.prometheus' versions.yaml)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | \`$(yq '.monitoring_tools.grafana' versions.yaml)\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cluster Target" >> $GITHUB_STEP_SUMMARY
          echo "- **Node 1**: \`${{ secrets.NODE1_IP || 'configured' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Node 2**: \`${{ secrets.NODE2_IP || 'configured' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Node 3**: \`${{ secrets.NODE3_IP || 'configured' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Services**: \`${{ secrets.SERVICES_SERVER_IP || 'configured' }}\`" >> $GITHUB_STEP_SUMMARY
