# Deploy OttoChain Metagraph
#
# Deploys the metagraph to 3 Hetzner nodes using Docker Compose.
# Layers are started sequentially across all nodes: GL0 → ML0 → DL1
#
# Flow:
#   1. Pull image, extract peer IDs from p12 keystores
#   2. Genesis (if wipe_state): GL0 genesis → ML0 create-genesis → stop
#   3. Write .env + compose to each node
#   4. Start GL0 on all nodes → form cluster
#   5. Start ML0 on all nodes → form cluster
#   6. Start DL1 on all nodes → form cluster
#   7. Health check

name: Deploy Metagraph

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: false
        default: 'latest'
      wipe_state:
        description: 'Wipe all state and run genesis'
        required: false
        type: boolean
        default: false
      enable_cl1:
        description: 'Enable CL1 (Currency L1) layer'
        required: false
        type: boolean
        default: false
      enable_gl1:
        description: 'Enable GL1 (DAG L1) layer'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Deployment environment'
        required: false
        type: choice
        options: [scratch, staging, production]
        default: scratch
  workflow_call:
    inputs:
      image_tag:
        type: string
        default: 'latest'
      wipe_state:
        type: boolean
        default: false
      enable_cl1:
        type: boolean
        default: false
      enable_gl1:
        type: boolean
        default: false
      environment:
        type: string
        default: scratch

env:
  IMAGE: ghcr.io/scasplte2/ottochain-metagraph
  IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
  COMPOSE_FILE: compose/metagraph-node.yml
  DEPLOY_DIR: /opt/ottochain

jobs:

  # ── Prepare: pull image, extract peer IDs ─────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'scratch' }}
    outputs:
      peer_id_1: ${{ steps.peer-ids.outputs.peer_id_1 }}
      peer_id_2: ${{ steps.peer-ids.outputs.peer_id_2 }}
      peer_id_3: ${{ steps.peer-ids.outputs.peer_id_3 }}
      needs_genesis: ${{ steps.genesis-check.outputs.needs_genesis }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          hosts: nodes

      - name: Docker login and pull
        uses: ./.github/actions/docker-login-pull
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.IMAGE }}
          image_tag: ${{ env.IMAGE_TAG }}

      - name: Ensure cl-wallet.jar on all nodes
        run: |
          CL_WALLET_URL="https://github.com/Constellation-Labs/tessellation/releases/download/v4.0.0-rc.2/cl-wallet.jar"
          for host in node1 node2 node3; do
            ssh $host "test -f /opt/ottochain/cl-wallet.jar || curl -sL -o /opt/ottochain/cl-wallet.jar '$CL_WALLET_URL'"
          done

      - name: Extract peer IDs from keystores
        id: peer-ids
        run: |
          # Node1: keys/key.p12, Node2: keys2/key.p12, Node3: keys3/key.p12
          for node_info in "1:node1:keys" "2:node2:keys2" "3:node3:keys3"; do
            NUM="${node_info%%:*}"
            rest="${node_info#*:}"
            HOST="${rest%%:*}"
            KEYS="${rest##*:}"

            PEER_ID=$(ssh $HOST "CL_KEYSTORE=/opt/ottochain/${KEYS}/key.p12 \
              CL_KEYALIAS=alias \
              CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
              java -jar /opt/ottochain/cl-wallet.jar show-id" 2>/dev/null)

            if [ -z "$PEER_ID" ]; then
              echo "::error::Failed to extract peer ID from $HOST ($KEYS/key.p12)"
              exit 1
            fi

            echo "peer_id_${NUM}=$PEER_ID" >> "$GITHUB_OUTPUT"
            echo "✓ Node${NUM} peer ID: ${PEER_ID:0:32}..."
          done

      - name: Check if genesis needed
        id: genesis-check
        run: |
          if [ "${{ inputs.wipe_state }}" = "true" ]; then
            echo "needs_genesis=true" >> "$GITHUB_OUTPUT"
            echo "Genesis: REQUIRED (wipe_state=true)"
          elif ! ssh node1 "test -f /opt/ottochain/genesis/genesis.address"; then
            echo "needs_genesis=true" >> "$GITHUB_OUTPUT"
            echo "Genesis: REQUIRED (genesis.address missing)"
          else
            echo "needs_genesis=false" >> "$GITHUB_OUTPUT"
            TOKEN_ID=$(ssh node1 'cat /opt/ottochain/genesis/genesis.address')
            echo "Genesis: NOT NEEDED (TOKEN_ID=$TOKEN_ID)"
          fi

  # ── Genesis: create GL0 + ML0 genesis snapshots ───────────────────────
  genesis:
    name: Genesis
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'scratch' }}
    needs: [prepare]
    if: needs.prepare.outputs.needs_genesis == 'true'
    outputs:
      token_id: ${{ steps.run-genesis.outputs.token_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          hosts: nodes

      - name: Stop existing containers
        run: |
          for host in node1 node2 node3; do
            echo "--- Stopping containers on $host ---"
            ssh $host "docker rm -f gl0 gl1 ml0 cl1 dl1 promtail node-exporter 2>/dev/null || true"
            echo "✓ $host cleaned"
          done

      - name: Wipe state on all nodes
        run: |
          for host in node1 node2 node3; do
            echo "--- Wiping state on $host ---"
            ssh $host "rm -rf /opt/ottochain/{gl0,gl1,ml0,cl1,dl1}-{data,logs}"
            ssh $host "mkdir -p /opt/ottochain/{gl0,ml0,dl1}-{data,logs}"
            ssh $host "rm -rf /opt/ottochain/genesis/*"
            ssh $host "mkdir -p /opt/ottochain/genesis"
            ssh $host "sync"
            echo "✓ $host wiped"
          done

      - name: Create GL0 genesis CSV
        run: |
          WALLET=$(ssh node1 "CL_KEYSTORE=/opt/ottochain/keys/key.p12 \
            CL_KEYALIAS=alias \
            CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
            java -jar /opt/ottochain/cl-wallet.jar show-address" 2>&1 | grep -oP 'DAG[a-zA-Z0-9]+' | head -1)

          if [ -z "$WALLET" ]; then
            echo "::error::Failed to extract wallet address"
            exit 1
          fi
          echo "Wallet: $WALLET"

          ssh node1 "echo '${WALLET},1000000000000000' > /opt/ottochain/genesis/genesis.csv"
          echo "✓ GL0 genesis CSV created"

      - name: Start GL0 for genesis
        run: |
          NODE1_IP="${{ secrets.HETZNER_NODE1_IP }}"
          GL0_PEER_ID="${{ needs.prepare.outputs.peer_id_1 }}"

          ssh node1 "docker run -d --name gl0 \
            --restart unless-stopped \
            -p 9000:9000 -p 9001:9001 -p 9002:9002 \
            -v /opt/ottochain/keys:/ottochain/keys:ro \
            -v /opt/ottochain/gl0-data:/ottochain/data \
            -v /opt/ottochain/gl0-logs:/ottochain/logs \
            -v /opt/ottochain/genesis:/ottochain/genesis:ro \
            -e LAYER=gl0 \
            -e IS_INITIAL=true \
            -e CL_APP_ENV=dev \
            -e CL_EXTERNAL_IP=${NODE1_IP} \
            -e CL_COLLATERAL=0 \
            -e CL_KEYSTORE=/ottochain/keys/key.p12 \
            -e CL_KEYALIAS=alias \
            -e CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
            -e JAVA_OPTS='-Xmx3g -Xms2g -XX:+UseZGC' \
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}"

      - name: Wait for GL0 Ready
        uses: ./.github/actions/wait-for-node-ready
        with:
          ssh_host: node1
          port: '9000'
          node_name: GL0
          max_attempts: '90'

      - name: Create ML0 genesis snapshot
        id: run-genesis
        run: |
          NODE1_IP="${{ secrets.HETZNER_NODE1_IP }}"
          GL0_PEER_ID="${{ needs.prepare.outputs.peer_id_1 }}"

          ssh node1 "docker run --rm \
            --network host \
            --entrypoint '' \
            -v /opt/ottochain/keys:/ottochain/keys:ro \
            -v /opt/ottochain/genesis:/ottochain/genesis \
            -w /ottochain/genesis \
            -e CL_KEYSTORE=/ottochain/keys/key.p12 \
            -e CL_KEYALIAS=alias \
            -e CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
            -e CL_GLOBAL_L0_PEER_ID=${GL0_PEER_ID} \
            -e CL_GLOBAL_L0_PEER_HOST=${NODE1_IP} \
            -e CL_GLOBAL_L0_PEER_PORT=9000 \
            -e CL_GLOBAL_L0_PEER_HTTP_HOST=${NODE1_IP} \
            -e CL_GLOBAL_L0_PEER_HTTP_PORT=9000 \
            -e CL_PUBLIC_HTTP_PORT=9200 \
            -e CL_P2P_HTTP_PORT=9201 \
            -e CL_CLI_HTTP_PORT=9202 \
            -e CL_COLLATERAL=0 \
            -e CL_APP_ENV=dev \
            -e CL_EXTERNAL_IP=${NODE1_IP} \
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }} \
            java -jar /ottochain/jars/ml0.jar create-genesis /ottochain/genesis/genesis.csv"

          # Verify
          if ! ssh node1 "test -f /opt/ottochain/genesis/genesis.snapshot"; then
            echo "::error::genesis.snapshot not found"
            exit 1
          fi

          TOKEN_ID=$(ssh node1 'cat /opt/ottochain/genesis/genesis.address')
          echo "token_id=$TOKEN_ID" >> "$GITHUB_OUTPUT"
          echo "✅ ML0 genesis complete — TOKEN_ID=$TOKEN_ID"

      - name: Stop genesis GL0
        run: ssh node1 "docker rm -f gl0"

      - name: Distribute genesis files
        run: |
          for host in node2 node3; do
            ssh $host "mkdir -p /opt/ottochain/genesis"
            ssh node1 'cat /opt/ottochain/genesis/genesis.address' | ssh $host 'cat > /opt/ottochain/genesis/genesis.address'
            ssh node1 'cat /opt/ottochain/genesis/genesis.csv' | ssh $host 'cat > /opt/ottochain/genesis/genesis.csv'
            echo "✓ Genesis files copied to $host"
          done

  # ── Deploy: compose up layer-by-layer across all nodes ─────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'scratch' }}
    needs: [prepare, genesis]
    if: always() && (needs.prepare.result == 'success') && (needs.genesis.result == 'success' || needs.genesis.result == 'skipped')
    outputs:
      gl0_peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
      ml0_peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
      token_id: ${{ steps.resolve-token.outputs.token_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          hosts: nodes

      - name: Resolve TOKEN_ID
        id: resolve-token
        run: |
          # From genesis job output, or read from existing file
          TOKEN_ID="${{ needs.genesis.outputs.token_id }}"
          if [ -z "$TOKEN_ID" ]; then
            TOKEN_ID=$(ssh node1 'cat /opt/ottochain/genesis/genesis.address 2>/dev/null' || echo "")
          fi
          if [ -z "$TOKEN_ID" ]; then
            echo "::error::TOKEN_ID not available (no genesis output and no genesis.address on node1)"
            exit 1
          fi
          echo "token_id=$TOKEN_ID" >> "$GITHUB_OUTPUT"
          echo "TOKEN_ID=$TOKEN_ID"

      - name: Stop existing containers
        if: ${{ needs.genesis.result == 'skipped' }}
        run: |
          # Only stop if we didn't already wipe in genesis job
          for host in node1 node2 node3; do
            ssh $host "docker rm -f gl0 gl1 ml0 cl1 dl1 promtail node-exporter 2>/dev/null || true"
          done

      - name: Deploy compose + .env to all nodes
        run: |
          NODE1_IP="${{ secrets.HETZNER_NODE1_IP }}"
          NODE2_IP="${{ secrets.HETZNER_NODE2_IP }}"
          NODE3_IP="${{ secrets.HETZNER_NODE3_IP }}"
          GL0_PEER_ID="${{ needs.prepare.outputs.peer_id_1 }}"
          ML0_PEER_ID="${{ needs.prepare.outputs.peer_id_1 }}"
          TOKEN_ID="${{ steps.resolve-token.outputs.token_id }}"

          for node_info in "1:node1:${NODE1_IP}:keys:true" "2:node2:${NODE2_IP}:keys2:" "3:node3:${NODE3_IP}:keys3:"; do
            NUM="${node_info%%:*}"
            rest="${node_info#*:}"
            HOST="${rest%%:*}"
            rest="${rest#*:}"
            IP="${rest%%:*}"
            rest="${rest#*:}"
            KEYS="${rest%%:*}"
            IS_INITIAL="${rest##*:}"

            echo "--- Deploying to $HOST ---"

            # Copy compose file
            ssh $HOST "mkdir -p /opt/ottochain"
            scp ${{ env.COMPOSE_FILE }} ${HOST}:/opt/ottochain/docker-compose.yml

            # Write .env
            ssh $HOST "cat > /opt/ottochain/.env << 'ENVEOF'
# OttoChain Node ${NUM} — auto-generated by deploy workflow
IMAGE=${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
EXTERNAL_IP=${IP}
NODE1_IP=${NODE1_IP}
IS_INITIAL=${IS_INITIAL}
KEYS_DIR=/opt/ottochain/${KEYS}
CL_PASSWORD=${{ secrets.CL_KEYSTORE_PASSWORD }}
GL0_PEER_ID=${GL0_PEER_ID}
ML0_PEER_ID=${ML0_PEER_ID}
TOKEN_ID=${TOKEN_ID}
GL0_JAVA_OPTS=-Xmx3g -Xms2g -XX:+UseZGC -XX:MaxMetaspaceSize=256m -XX:MaxDirectMemorySize=256m -XX:ReservedCodeCacheSize=128m -XX:+ExitOnOutOfMemoryError -XX:+UseStringDeduplication -XX:SoftRefLRUPolicyMSPerMB=50 -XX:ZUncommitDelay=60 -Dlogback.configurationFile=/ottochain/logback.xml
ML0_JAVA_OPTS=-Xmx4g -Xms2g -XX:+UseZGC -XX:MaxMetaspaceSize=256m -XX:MaxDirectMemorySize=256m -XX:ReservedCodeCacheSize=128m -XX:+ExitOnOutOfMemoryError -XX:+UseStringDeduplication -XX:SoftRefLRUPolicyMSPerMB=50 -XX:ZUncommitDelay=60 -Dlogback.configurationFile=/ottochain/logback.xml
DL1_JAVA_OPTS=-Xmx3g -Xms1g -XX:+UseZGC -XX:MaxMetaspaceSize=256m -XX:MaxDirectMemorySize=256m -XX:ReservedCodeCacheSize=128m -XX:+ExitOnOutOfMemoryError -XX:+UseStringDeduplication -XX:SoftRefLRUPolicyMSPerMB=50 -XX:ZUncommitDelay=60 -Dlogback.configurationFile=/ottochain/logback.xml
CL1_JAVA_OPTS=-Xmx2g -Xms1g -XX:+UseZGC -XX:MaxMetaspaceSize=256m -XX:MaxDirectMemorySize=256m -XX:ReservedCodeCacheSize=128m -XX:+ExitOnOutOfMemoryError -XX:+UseStringDeduplication -XX:SoftRefLRUPolicyMSPerMB=50 -XX:ZUncommitDelay=60 -Dlogback.configurationFile=/ottochain/logback.xml
ENVEOF"
            echo "✓ $HOST: compose + .env deployed"
          done

      # ── GL0: Start on all nodes, form cluster ──────────────────────────

      - name: Start GL0 on all nodes
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose up -d gl0"
          done
          echo "✓ GL0 started on all nodes"

      - name: Wait for GL0 genesis Ready
        uses: ./.github/actions/wait-for-node-ready
        with:
          ssh_host: node1
          port: '9000'
          node_name: GL0
          max_attempts: '90'

      - name: Join GL0 cluster
        uses: ./.github/actions/join-cluster
        with:
          hosts: 'node2 node3'
          cli_port: '9002'
          p2p_port: '9001'
          public_port: '9000'
          peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
          peer_ip: ${{ secrets.HETZNER_NODE1_IP }}
          layer_name: GL0

      - name: Wait for GL0 cluster size
        uses: ./.github/actions/wait-for-cluster-size
        with:
          ssh_host: node1
          port: '9000'
          layer_name: GL0
          expected_size: '3'

      - name: Verify GL0 cluster Ready
        uses: ./.github/actions/verify-cluster-ready
        with:
          hosts: 'node1 node2 node3'
          port: '9000'
          layer_name: GL0

      # ── GL1 (optional) ────────────────────────────────────────────────

      - name: Start GL1 on all nodes
        if: ${{ inputs.enable_gl1 == true }}
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose --profile gl1 up -d gl1"
          done

      # TODO: GL1 join + cluster verification (if enabled)

      # ── ML0: Start on all nodes, form cluster ──────────────────────────

      - name: Start ML0 on all nodes
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose up -d ml0"
          done
          echo "✓ ML0 started on all nodes"

      - name: Wait for ML0 genesis Ready
        uses: ./.github/actions/wait-for-node-ready
        with:
          ssh_host: node1
          port: '9200'
          node_name: ML0
          max_attempts: '90'

      - name: Join ML0 cluster
        uses: ./.github/actions/join-cluster
        with:
          hosts: 'node2 node3'
          cli_port: '9202'
          p2p_port: '9201'
          public_port: '9200'
          peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
          peer_ip: ${{ secrets.HETZNER_NODE1_IP }}
          layer_name: ML0

      - name: Wait for ML0 cluster size
        uses: ./.github/actions/wait-for-cluster-size
        with:
          ssh_host: node1
          port: '9200'
          layer_name: ML0
          expected_size: '3'

      - name: Verify ML0 cluster Ready
        uses: ./.github/actions/verify-cluster-ready
        with:
          hosts: 'node1 node2 node3'
          port: '9200'
          layer_name: ML0

      # ── CL1 (optional) ────────────────────────────────────────────────

      - name: Start CL1 on all nodes
        if: ${{ inputs.enable_cl1 == true }}
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose --profile cl1 up -d cl1"
          done

      # TODO: CL1 join + cluster verification (if enabled)

      # ── DL1: Start on all nodes, form cluster ──────────────────────────

      - name: Start DL1 on all nodes
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose up -d dl1"
          done
          echo "✓ DL1 started on all nodes"

      - name: Wait for DL1 genesis Ready
        uses: ./.github/actions/wait-for-node-ready
        with:
          ssh_host: node1
          port: '9400'
          node_name: DL1
          max_attempts: '90'

      - name: Join DL1 cluster
        uses: ./.github/actions/join-cluster
        with:
          hosts: 'node2 node3'
          cli_port: '9402'
          p2p_port: '9401'
          public_port: '9400'
          peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
          peer_ip: ${{ secrets.HETZNER_NODE1_IP }}
          layer_name: DL1

      - name: Wait for DL1 cluster size
        uses: ./.github/actions/wait-for-cluster-size
        with:
          ssh_host: node1
          port: '9400'
          layer_name: DL1
          expected_size: '3'

      - name: Verify DL1 cluster Ready
        uses: ./.github/actions/verify-cluster-ready
        with:
          hosts: 'node1 node2 node3'
          port: '9400'
          layer_name: DL1

      # ── Infrastructure ─────────────────────────────────────────────────

      - name: Start infrastructure containers
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose up -d node-exporter promtail"
          done
          echo "✓ Infrastructure containers started"

  # ── Health Check ───────────────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'scratch' }}
    needs: [prepare, deploy]
    if: always() && needs.deploy.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          hosts: nodes

      - name: Check all layers
        run: |
          echo "=== OttoChain Cluster Health ==="
          FAILED=0

          LAYERS="gl0 ml0 dl1"
          if [ "${{ inputs.enable_gl1 }}" = "true" ]; then LAYERS="gl0 gl1 ml0 dl1"; fi
          if [ "${{ inputs.enable_cl1 }}" = "true" ]; then LAYERS="gl0 ml0 cl1 dl1"; fi

          for layer in $LAYERS; do
            case $layer in
              gl0) port=9000 ;; gl1) port=9100 ;; ml0) port=9200 ;; cl1) port=9300 ;; dl1) port=9400 ;;
            esac
            for host in node1 node2 node3; do
              state=$(ssh $host "curl -sf http://localhost:$port/node/info | jq -r .state" 2>/dev/null || echo "DOWN")
              STATUS="✅"; [ "$state" != "Ready" ] && STATUS="❌" && FAILED=$((FAILED + 1))
              echo "$STATUS $host $layer: $state"
            done
          done

          if [ "$FAILED" -gt 0 ]; then echo "::warning::$FAILED node(s) not Ready"; fi

      - name: Verify peer ID uniqueness
        run: |
          echo "=== Verifying unique peer IDs ==="
          DL1_1=$(ssh node1 "curl -sf http://localhost:9400/node/info | jq -r .id" || echo "error")
          DL1_2=$(ssh node2 "curl -sf http://localhost:9400/node/info | jq -r .id" || echo "error")
          DL1_3=$(ssh node3 "curl -sf http://localhost:9400/node/info | jq -r .id" || echo "error")

          if [ "$DL1_1" = "$DL1_2" ] || [ "$DL1_1" = "$DL1_3" ] || [ "$DL1_2" = "$DL1_3" ]; then
            echo "::error::DL1 nodes have DUPLICATE peer IDs!"
            exit 1
          fi
          echo "✓ All DL1 nodes have unique peer IDs"

      - name: Summary
        run: |
          echo "## 🚀 Metagraph Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.IMAGE }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: \`${{ inputs.environment || 'scratch' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Node | Layer | Port | State |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|------|-------|" >> $GITHUB_STEP_SUMMARY

          LAYERS="gl0 ml0 dl1"
          for layer in $LAYERS; do
            case $layer in
              gl0) port=9000 ;; ml0) port=9200 ;; dl1) port=9400 ;;
            esac
            for host in node1 node2 node3; do
              state=$(ssh $host "curl -sf http://localhost:$port/node/info | jq -r .state" 2>/dev/null || echo "?")
              ICON="✅"; [ "$state" != "Ready" ] && ICON="❌"
              echo "| $host | $ICON ${layer^^} | $port | $state |" >> $GITHUB_STEP_SUMMARY
            done
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GL0 Peer ID**: \`${{ needs.prepare.outputs.peer_id_1 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Token ID**: \`${{ needs.deploy.outputs.token_id }}\`" >> $GITHUB_STEP_SUMMARY
