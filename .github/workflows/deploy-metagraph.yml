            -p 9400:9400 -p 9401:9401 -p 9402:9402 \
            -v /opt/ottochain/keys:/ottochain/keys:ro \
            -v /opt/ottochain/dl1-data:/ottochain/data \
            -v /opt/ottochain/dl1-logs:/ottochain/logs \
              -v /opt/ottochain/logback.xml:/ottochain/logback.xml:ro \
            -e LAYER=dl1 \
            -e IS_INITIAL=true \
