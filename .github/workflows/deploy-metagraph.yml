# Deploy OttoChain Metagraph
#
# Deploys the metagraph to 3 Hetzner nodes using Docker Compose.
#
# Flow:
#   1. Prepare: decode keystores, extract peer IDs in CI
#   2. Genesis (if needed): run GL0 + ML0 genesis entirely in CI
#   3. Deploy: push compose + .env + genesis files, start layers sequentially
#   4. Health check
#
# Genesis runs in CI — nodes never create genesis. Watchdog can't accidentally genesis.
# Inter-node traffic uses Hetzner private network (10.x). Public IPs for external access.

name: Deploy Metagraph

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: false
        default: 'latest'
      wipe_state:
        description: 'Wipe all state and run genesis'
        required: false
        type: boolean
        default: false
      enable_cl1:
        description: 'Enable CL1 (Currency L1) layer'
        required: false
        type: boolean
        default: false
      enable_gl1:
        description: 'Enable GL1 (DAG L1) layer'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Deployment environment'
        required: false
        type: choice
        options: [scratch, staging, production]
        default: scratch
  workflow_call:
    inputs:
      image_tag:
        type: string
        default: 'latest'
      wipe_state:
        type: boolean
        default: false
      enable_cl1:
        type: boolean
        default: false
      enable_gl1:
        type: boolean
        default: false
      environment:
        type: string
        default: scratch

env:
  IMAGE: ghcr.io/scasplte2/ottochain-metagraph
  IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
  COMPOSE_FILE: compose/metagraph-node.yml

jobs:

  # ── Prepare: extract peer IDs from keystores in CI ─────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'scratch' }}
    outputs:
      peer_id_1: ${{ steps.peer-ids.outputs.peer_id_1 }}
      peer_id_2: ${{ steps.peer-ids.outputs.peer_id_2 }}
      peer_id_3: ${{ steps.peer-ids.outputs.peer_id_3 }}
      wallet_address: ${{ steps.wallet.outputs.address }}
      needs_genesis: ${{ steps.genesis-check.outputs.needs_genesis }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          hosts: nodes

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download cl-wallet
        run: |
          TESS_VERSION=$(grep -A1 'tessellation:' versions.yaml | grep 'version:' | sed 's/.*"\(.*\)"/\1/')
          echo "Tessellation version: $TESS_VERSION"
          curl -sL -o cl-wallet.jar \
            "https://github.com/Constellation-Labs/tessellation/releases/download/v${TESS_VERSION}/cl-wallet.jar"

      - name: Decode keystores
        run: |
          mkdir -p keys
          echo "${{ secrets.CL_KEYSTORE_NODE1 }}" | base64 -d > keys/key1.p12
          echo "${{ secrets.CL_KEYSTORE_NODE2 }}" | base64 -d > keys/key2.p12
          echo "${{ secrets.CL_KEYSTORE_NODE3 }}" | base64 -d > keys/key3.p12

      - name: Extract peer IDs
        id: peer-ids
        run: |
          for i in 1 2 3; do
            PEER_ID=$(CL_KEYSTORE=keys/key${i}.p12 CL_KEYALIAS=alias \
              CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
              java -jar cl-wallet.jar show-id 2>/dev/null)

            if [ -z "$PEER_ID" ]; then
              echo "::error::Failed to extract peer ID from key${i}.p12"
              exit 1
            fi
            echo "peer_id_${i}=$PEER_ID" >> "$GITHUB_OUTPUT"
            echo "✓ Node${i} peer ID: ${PEER_ID:0:32}..."
          done

      - name: Extract wallet address
        id: wallet
        run: |
          WALLET=$(CL_KEYSTORE=keys/key1.p12 CL_KEYALIAS=alias \
            CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
            java -jar cl-wallet.jar show-address 2>&1 | grep -oP 'DAG[a-zA-Z0-9]+' | head -1)
          echo "address=$WALLET" >> "$GITHUB_OUTPUT"
          echo "✓ Wallet: $WALLET"

      - name: Docker login and pull
        uses: ./.github/actions/docker-login-pull
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ env.IMAGE }}
          image_tag: ${{ env.IMAGE_TAG }}

      - name: Check if genesis needed
        id: genesis-check
        run: |
          if [ "${{ inputs.wipe_state }}" = "true" ]; then
            echo "needs_genesis=true" >> "$GITHUB_OUTPUT"
          elif ! ssh node1 "test -f /opt/ottochain/genesis/genesis.address" 2>/dev/null; then
            echo "needs_genesis=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_genesis=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Genesis: create GL0 + ML0 genesis entirely in CI ──────────────────
  genesis:
    name: Genesis
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'scratch' }}
    needs: [prepare]
    if: needs.prepare.outputs.needs_genesis == 'true'
    outputs:
      token_id: ${{ steps.ml0-genesis.outputs.token_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ottobot-ai --password-stdin

      - name: Pull image
        run: docker pull ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Decode node1 keystore
        run: |
          mkdir -p keys genesis
          echo "${{ secrets.CL_KEYSTORE_NODE1 }}" | base64 -d > keys/key.p12

      - name: Create GL0 genesis CSV
        run: |
          WALLET="${{ needs.prepare.outputs.wallet_address }}"
          if [ -z "$WALLET" ]; then
            # Fallback: extract here
            WALLET=$(docker run --rm \
              -v $PWD/keys:/keys:ro \
              -e CL_KEYSTORE=/keys/key.p12 \
              -e CL_KEYALIAS=alias \
              -e CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
              --entrypoint '' \
              ${{ env.IMAGE }}:${{ env.IMAGE_TAG }} \
              java -jar /ottochain/jars/cl-wallet.jar show-address 2>&1 | grep -oP 'DAG[a-zA-Z0-9]+' | head -1 || true)
          fi

          # Double fallback: use setup-java + downloaded cl-wallet
          if [ -z "$WALLET" ]; then
            TESS_VERSION=$(grep -A1 'tessellation:' versions.yaml | grep 'version:' | sed 's/.*"\(.*\)"/\1/')
            curl -sL -o cl-wallet.jar \
              "https://github.com/Constellation-Labs/tessellation/releases/download/v${TESS_VERSION}/cl-wallet.jar"
            WALLET=$(CL_KEYSTORE=keys/key.p12 CL_KEYALIAS=alias \
              CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
              java -jar cl-wallet.jar show-address 2>&1 | grep -oP 'DAG[a-zA-Z0-9]+' | head -1)
          fi

          echo "${WALLET},1000000000000000" > genesis/genesis.csv
          echo "✓ Genesis CSV: $WALLET"

      - name: Start GL0 in CI
        run: |
          GL0_PEER_ID="${{ needs.prepare.outputs.peer_id_1 }}"

          docker run -d --name gl0 \
            -p 9000:9000 -p 9001:9001 -p 9002:9002 \
            -v $PWD/keys:/ottochain/keys:ro \
            -v $PWD/genesis:/ottochain/genesis:ro \
            -e LAYER=gl0 \
            -e IS_INITIAL=true \
            -e CL_APP_ENV=dev \
            -e CL_EXTERNAL_IP=127.0.0.1 \
            -e CL_COLLATERAL=0 \
            -e CL_KEYSTORE=/ottochain/keys/key.p12 \
            -e CL_KEYALIAS=alias \
            -e CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
            -e JAVA_OPTS='-Xmx2g -Xms1g -XX:+UseZGC' \
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Wait for GL0 Ready
        run: |
          for i in $(seq 1 90); do
            state=$(curl -sf http://localhost:9000/node/info 2>/dev/null | jq -r .state 2>/dev/null || echo "")
            if [ "$state" = "Ready" ]; then
              echo "✓ GL0 Ready (attempt $i)"
              break
            fi
            if [ "$i" = "90" ]; then
              echo "::error::GL0 failed to reach Ready"
              docker logs gl0 --tail 30
              exit 1
            fi
            sleep 5
          done

      - name: Create ML0 genesis snapshot
        id: ml0-genesis
        run: |
          GL0_PEER_ID="${{ needs.prepare.outputs.peer_id_1 }}"

          docker run --rm \
            --network host \
            --entrypoint '' \
            -v $PWD/keys:/ottochain/keys:ro \
            -v $PWD/genesis:/ottochain/genesis \
            -w /ottochain/genesis \
            -e CL_KEYSTORE=/ottochain/keys/key.p12 \
            -e CL_KEYALIAS=alias \
            -e CL_PASSWORD='${{ secrets.CL_KEYSTORE_PASSWORD }}' \
            -e CL_GLOBAL_L0_PEER_ID=${GL0_PEER_ID} \
            -e CL_GLOBAL_L0_PEER_HOST=127.0.0.1 \
            -e CL_GLOBAL_L0_PEER_PORT=9000 \
            -e CL_GLOBAL_L0_PEER_HTTP_HOST=127.0.0.1 \
            -e CL_GLOBAL_L0_PEER_HTTP_PORT=9000 \
            -e CL_PUBLIC_HTTP_PORT=9200 \
            -e CL_P2P_HTTP_PORT=9201 \
            -e CL_CLI_HTTP_PORT=9202 \
            -e CL_COLLATERAL=0 \
            -e CL_APP_ENV=dev \
            -e CL_EXTERNAL_IP=127.0.0.1 \
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }} \
            java -jar /ottochain/jars/ml0.jar create-genesis /ottochain/genesis/genesis.csv

          if [ ! -f genesis/genesis.snapshot ] || [ ! -f genesis/genesis.address ]; then
            echo "::error::ML0 genesis failed"
            exit 1
          fi

          TOKEN_ID=$(cat genesis/genesis.address)
          echo "token_id=$TOKEN_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Genesis complete — TOKEN_ID=$TOKEN_ID"

      - name: Stop GL0
        if: always()
        run: docker rm -f gl0 2>/dev/null || true

      - name: Upload genesis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genesis
          path: |
            genesis/genesis.address
            genesis/genesis.snapshot
            genesis/genesis.csv
          retention-days: 7

  # ── Deploy: push compose, start layers sequentially ────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'scratch' }}
    needs: [prepare, genesis]
    if: always() && (needs.prepare.result == 'success') && (needs.genesis.result == 'success' || needs.genesis.result == 'skipped')
    outputs:
      gl0_peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
      ml0_peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
      token_id: ${{ steps.resolve-token.outputs.token_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          hosts: nodes

      - name: Download genesis artifacts
        if: needs.genesis.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: genesis
          path: genesis

      - name: Stop existing containers
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose down 2>/dev/null || true"
            ssh $host "docker rm -f gl0 gl1 ml0 cl1 dl1 promtail node-exporter 2>/dev/null || true"
          done

      - name: Wipe state (if genesis)
        if: needs.genesis.result == 'success'
        run: |
          for host in node1 node2 node3; do
            ssh $host "rm -rf /opt/ottochain/{gl0,gl1,ml0,cl1,dl1}-{data,logs}"
            ssh $host "mkdir -p /opt/ottochain/{gl0,ml0,dl1}-{data,logs}"
            ssh $host "sync"
          done

      - name: Push genesis files to all nodes
        if: needs.genesis.result == 'success'
        run: |
          for host in node1 node2 node3; do
            ssh $host "mkdir -p /opt/ottochain/genesis"
            scp genesis/genesis.address ${host}:/opt/ottochain/genesis/
            scp genesis/genesis.snapshot ${host}:/opt/ottochain/genesis/
            scp genesis/genesis.csv ${host}:/opt/ottochain/genesis/
            echo "✓ Genesis files pushed to $host"
          done

      - name: Resolve TOKEN_ID
        id: resolve-token
        run: |
          TOKEN_ID="${{ needs.genesis.outputs.token_id }}"
          if [ -z "$TOKEN_ID" ]; then
            TOKEN_ID=$(ssh node1 'cat /opt/ottochain/genesis/genesis.address 2>/dev/null' || echo "")
          fi
          if [ -z "$TOKEN_ID" ]; then
            echo "::error::TOKEN_ID not available"
            exit 1
          fi
          echo "token_id=$TOKEN_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy compose + .env to all nodes
        run: |
          NODE1_IP="${{ secrets.HETZNER_NODE1_IP }}"
          NODE2_IP="${{ secrets.HETZNER_NODE2_IP }}"
          NODE3_IP="${{ secrets.HETZNER_NODE3_IP }}"
          # Private IPs for inter-node traffic
          NODE1_PRIV="${{ secrets.HETZNER_NODE1_PRIVATE_IP }}"
          NODE2_PRIV="${{ secrets.HETZNER_NODE2_PRIVATE_IP }}"
          NODE3_PRIV="${{ secrets.HETZNER_NODE3_PRIVATE_IP }}"
          SERVICES_PRIV="${{ secrets.HETZNER_SERVICES_PRIVATE_IP }}"
          GL0_PEER_ID="${{ needs.prepare.outputs.peer_id_1 }}"
          ML0_PEER_ID="${{ needs.prepare.outputs.peer_id_1 }}"
          TOKEN_ID="${{ steps.resolve-token.outputs.token_id }}"

          # JVM opts (shared across nodes)
          JVM_COMMON="-XX:+UseZGC -XX:MaxMetaspaceSize=256m -XX:MaxDirectMemorySize=256m -XX:ReservedCodeCacheSize=128m -XX:+ExitOnOutOfMemoryError -XX:+UseStringDeduplication -XX:SoftRefLRUPolicyMSPerMB=50 -XX:ZUncommitDelay=60 -Dlogback.configurationFile=/ottochain/logback.xml"

          # node_num:ssh_host:public_ip:private_ip:keys_dir:is_initial
          for node_info in "1:node1:${NODE1_IP}:${NODE1_PRIV}:keys:true" "2:node2:${NODE2_IP}:${NODE2_PRIV}:keys2:" "3:node3:${NODE3_IP}:${NODE3_PRIV}:keys3:"; do
            NUM="${node_info%%:*}"
            rest="${node_info#*:}"
            HOST="${rest%%:*}"
            rest="${rest#*:}"
            PUBLIC_IP="${rest%%:*}"
            rest="${rest#*:}"
            PRIVATE_IP="${rest%%:*}"
            rest="${rest#*:}"
            KEYS="${rest%%:*}"
            IS_INITIAL="${rest##*:}"

            # Copy compose file
            ssh $HOST "mkdir -p /opt/ottochain"
            scp ${{ env.COMPOSE_FILE }} ${HOST}:/opt/ottochain/docker-compose.yml

            # Write .env — public IP for CL_EXTERNAL_IP, private IPs for peer connections
            ssh $HOST "cat > /opt/ottochain/.env << 'ENVEOF'
# OttoChain Node ${NUM} — auto-generated by deploy workflow
IMAGE=${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
EXTERNAL_IP=${PUBLIC_IP}
NODE1_IP=${NODE1_PRIV}
IS_INITIAL=${IS_INITIAL}
KEYS_DIR=/opt/ottochain/${KEYS}
CL_PASSWORD=${{ secrets.CL_KEYSTORE_PASSWORD }}
GL0_PEER_ID=${GL0_PEER_ID}
ML0_PEER_ID=${ML0_PEER_ID}
TOKEN_ID=${TOKEN_ID}
LOKI_URL=http://${SERVICES_PRIV}:3100
GL0_JAVA_OPTS=-Xmx3g -Xms2g ${JVM_COMMON}
ML0_JAVA_OPTS=-Xmx4g -Xms2g ${JVM_COMMON}
DL1_JAVA_OPTS=-Xmx3g -Xms1g ${JVM_COMMON}
CL1_JAVA_OPTS=-Xmx2g -Xms1g ${JVM_COMMON}
ENVEOF"
            echo "✓ $HOST deployed (IS_INITIAL=${IS_INITIAL:-false})"
          done

      - name: Deploy promtail config
        run: |
          SERVICES_PRIV="${{ secrets.HETZNER_SERVICES_PRIVATE_IP }}"
          for host in node1 node2 node3; do
            ssh $host "cat > /opt/ottochain/promtail.yml << 'EOF'
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://${SERVICES_PRIV}:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
EOF"
            echo "✓ $host promtail config deployed"
          done

      # ── GL0 ────────────────────────────────────────────────────────────

      - name: Start GL0 on all nodes
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose up -d gl0"
          done

      - name: Wait for GL0 genesis Ready
        uses: ./.github/actions/wait-for-node-ready
        with:
          ssh_host: node1
          port: '9000'
          node_name: GL0
          max_attempts: '90'

      - name: Join GL0 cluster
        uses: ./.github/actions/join-cluster
        with:
          hosts: 'node2 node3'
          cli_port: '9002'
          p2p_port: '9001'
          public_port: '9000'
          peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
          peer_ip: ${{ secrets.HETZNER_NODE1_PRIVATE_IP }}
          layer_name: GL0

      - name: Wait for GL0 cluster
        uses: ./.github/actions/wait-for-cluster-size
        with:
          ssh_host: node1
          port: '9000'
          layer_name: GL0
          expected_size: '3'

      - name: Verify GL0 Ready
        uses: ./.github/actions/verify-cluster-ready
        with:
          hosts: 'node1 node2 node3'
          port: '9000'
          layer_name: GL0

      # ── ML0 ────────────────────────────────────────────────────────────

      - name: Start ML0 on all nodes
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose up -d ml0"
          done

      - name: Wait for ML0 genesis Ready
        uses: ./.github/actions/wait-for-node-ready
        with:
          ssh_host: node1
          port: '9200'
          node_name: ML0
          max_attempts: '90'

      - name: Join ML0 cluster
        uses: ./.github/actions/join-cluster
        with:
          hosts: 'node2 node3'
          cli_port: '9202'
          p2p_port: '9201'
          public_port: '9200'
          peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
          peer_ip: ${{ secrets.HETZNER_NODE1_PRIVATE_IP }}
          layer_name: ML0

      - name: Wait for ML0 cluster
        uses: ./.github/actions/wait-for-cluster-size
        with:
          ssh_host: node1
          port: '9200'
          layer_name: ML0
          expected_size: '3'

      - name: Verify ML0 Ready
        uses: ./.github/actions/verify-cluster-ready
        with:
          hosts: 'node1 node2 node3'
          port: '9200'
          layer_name: ML0

      # ── DL1 ────────────────────────────────────────────────────────────

      - name: Start DL1 on all nodes
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose up -d dl1"
          done

      - name: Wait for DL1 genesis Ready
        uses: ./.github/actions/wait-for-node-ready
        with:
          ssh_host: node1
          port: '9400'
          node_name: DL1
          max_attempts: '90'

      - name: Join DL1 cluster
        uses: ./.github/actions/join-cluster
        with:
          hosts: 'node2 node3'
          cli_port: '9402'
          p2p_port: '9401'
          public_port: '9400'
          peer_id: ${{ needs.prepare.outputs.peer_id_1 }}
          peer_ip: ${{ secrets.HETZNER_NODE1_PRIVATE_IP }}
          layer_name: DL1

      - name: Wait for DL1 cluster
        uses: ./.github/actions/wait-for-cluster-size
        with:
          ssh_host: node1
          port: '9400'
          layer_name: DL1
          expected_size: '3'

      - name: Verify DL1 Ready
        uses: ./.github/actions/verify-cluster-ready
        with:
          hosts: 'node1 node2 node3'
          port: '9400'
          layer_name: DL1

      # ── Infrastructure ─────────────────────────────────────────────────

      - name: Start infrastructure
        run: |
          for host in node1 node2 node3; do
            ssh $host "cd /opt/ottochain && docker compose up -d node-exporter promtail"
          done

  # ── Health Check ───────────────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'scratch' }}
    needs: [prepare, deploy]
    if: always() && needs.deploy.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          hosts: nodes

      - name: Check all layers on all nodes
        run: |
          echo "=== OttoChain Cluster Health ==="
          FAILED=0

          for layer_port in "gl0:9000" "ml0:9200" "dl1:9400"; do
            layer="${layer_port%%:*}"
            port="${layer_port##*:}"
            for host in node1 node2 node3; do
              state=$(ssh $host "curl -sf http://localhost:$port/node/info | jq -r .state" 2>/dev/null || echo "DOWN")
              STATUS="✅"; [ "$state" != "Ready" ] && STATUS="❌" && FAILED=$((FAILED + 1))
              echo "$STATUS $host ${layer^^}: $state"
            done
          done

          if [ "$FAILED" -gt 0 ]; then echo "::warning::$FAILED node(s) not Ready"; fi

      - name: Verify peer ID uniqueness
        run: |
          DL1_1=$(ssh node1 "curl -sf http://localhost:9400/node/info | jq -r .id" || echo "e1")
          DL1_2=$(ssh node2 "curl -sf http://localhost:9400/node/info | jq -r .id" || echo "e2")
          DL1_3=$(ssh node3 "curl -sf http://localhost:9400/node/info | jq -r .id" || echo "e3")

          if [ "$DL1_1" = "$DL1_2" ] || [ "$DL1_1" = "$DL1_3" ] || [ "$DL1_2" = "$DL1_3" ]; then
            echo "::error::DL1 nodes have DUPLICATE peer IDs!"
            exit 1
          fi
          echo "✓ All DL1 nodes have unique peer IDs"

      - name: Summary
        run: |
          echo "## 🚀 Metagraph Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.IMAGE }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: \`${{ inputs.environment || 'scratch' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Node | Layer | State |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|-------|" >> $GITHUB_STEP_SUMMARY

          for layer_port in "gl0:9000" "ml0:9200" "dl1:9400"; do
            layer="${layer_port%%:*}"
            port="${layer_port##*:}"
            for host in node1 node2 node3; do
              state=$(ssh $host "curl -sf http://localhost:$port/node/info | jq -r .state" 2>/dev/null || echo "?")
              ICON="✅"; [ "$state" != "Ready" ] && ICON="❌"
              echo "| $host | $ICON ${layer^^} | $state |" >> $GITHUB_STEP_SUMMARY
            done
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GL0 Peer ID**: \`${{ needs.prepare.outputs.peer_id_1 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Token ID**: \`${{ needs.deploy.outputs.token_id }}\`" >> $GITHUB_STEP_SUMMARY
