name: Deploy — Staging Environment

on:
  workflow_dispatch:
    inputs:
      tessellation_version:
        description: 'Tessellation version'
        required: true
        default: 'v2.8.0'
      skip_build:
        description: 'Skip JAR build'
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          hetzner_ssh_key: ${{ secrets.HETZNER_SSH_KEY }}
          node1_ip: ${{ secrets.HETZNER_NODE1_IP }}
          node2_ip: ${{ secrets.HETZNER_NODE2_IP }}
          node3_ip: ${{ secrets.HETZNER_NODE3_IP }}
          services_ip: ${{ secrets.HETZNER_SERVICES_IP }}

      - name: Plan deployment
        uses: ./.github/actions/plan-deployment
        id: plan
        with:
          environment: staging
          branch_name: ${{ github.ref_name }}

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          environment: staging
          keystore_password: ${{ secrets.CL_KEYSTORE_PASSWORD }}

      - name: Stop containers
        uses: ./.github/actions/manage-containers
        with:
          action: stop
          hosts: 'node1,node2,node3'
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Start containers
        uses: ./.github/actions/manage-containers
        with:
          action: start
          hosts: 'node1,node2,node3'
          ssh_key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Deployment summary
        shell: bash
        run: |
          echo "✅ Staging deployment complete"
          echo "Environment: staging"
          echo "Branch: ${{ github.ref_name }}"
