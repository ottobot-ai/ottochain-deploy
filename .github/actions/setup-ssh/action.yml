name: Setup SSH for Hetzner Nodes
description: |
  Configure SSH access to Hetzner nodes. Sets up the SSH private key
  and configures ~/.ssh/config entries for all cluster nodes and services.

inputs:
  hetzner_ssh_key:
    description: 'SSH private key for Hetzner nodes'
    required: true
  node1_ip:
    description: 'IP address of node1'
    required: false
    default: ''
  node2_ip:
    description: 'IP address of node2'
    required: false
    default: ''
  node3_ip:
    description: 'IP address of node3'
    required: false
    default: ''
  services_ip:
    description: 'IP address of services node'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Create SSH directory and write key
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh
        echo "${{ inputs.hetzner_ssh_key }}" > ~/.ssh/hetzner
        chmod 600 ~/.ssh/hetzner

    - name: Configure SSH hosts
      shell: bash
      run: |
        set -euo pipefail
        cat >> ~/.ssh/config << EOF
        Host node1
          HostName ${{ inputs.node1_ip }}
          User root
          IdentityFile ~/.ssh/hetzner
          StrictHostKeyChecking no

        Host node2
          HostName ${{ inputs.node2_ip }}
          User root
          IdentityFile ~/.ssh/hetzner
          StrictHostKeyChecking no

        Host node3
          HostName ${{ inputs.node3_ip }}
          User root
          IdentityFile ~/.ssh/hetzner
          StrictHostKeyChecking no

        Host services
          HostName ${{ inputs.services_ip }}
          User root
          IdentityFile ~/.ssh/hetzner
          StrictHostKeyChecking no
        EOF
        echo "✅ SSH configured for all nodes and services"

    - name: Set SSH permissions
      shell: bash
      run: |
        set -euo pipefail
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/config 2>/dev/null || true
        echo "✅ SSH permissions set correctly"
