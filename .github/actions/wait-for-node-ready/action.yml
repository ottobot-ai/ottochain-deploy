name: Wait for Node Ready
description: |
  Poll a tessellation node's /node/info endpoint via SSH until it reaches
  the 'Ready' state, then capture its peer ID. Replaces repeated 5-second
  polling loops in deploy-metagraph.yml.

inputs:
  ssh_host:
    description: 'SSH host alias (e.g. node1)'
    required: true
  port:
    description: 'HTTP port of the tessellation layer (e.g. 9000 for GL0)'
    required: true
  node_name:
    description: 'Display name used in log messages (e.g. GL0, ML0)'
    required: true
  max_attempts:
    description: 'Maximum number of 5-second poll attempts before failing'
    required: false
    default: '90'

outputs:
  peer_id:
    description: 'Peer ID reported by /node/info once the node is Ready'
    value: ${{ steps.poll.outputs.peer_id }}

runs:
  using: composite
  steps:
    - name: Poll until Ready
      id: poll
      shell: bash
      run: |
        MAX="${{ inputs.max_attempts }}"
        PORT="${{ inputs.port }}"
        HOST="${{ inputs.ssh_host }}"
        NAME="${{ inputs.node_name }}"

        echo "Waiting for $NAME on $HOST:$PORT to become Ready (max ${MAX} attempts × 5s)..."
        for i in $(seq 1 "$MAX"); do
          state=$(ssh "$HOST" "curl -sf http://localhost:$PORT/node/info | jq -r .state" 2>/dev/null || echo "")
          if [ "$state" = "Ready" ]; then
            echo "$NAME is Ready after $((i * 5))s"
            break
          fi
          if [ "$i" = "$MAX" ]; then
            echo "::error::$NAME on $HOST failed to reach Ready state after $((MAX * 5))s (last state: ${state:-unreachable})"
            exit 1
          fi
          echo "$NAME $HOST: ${state:-unreachable} (attempt $i/$MAX)"
          sleep 5
        done

        PEER_ID=$(ssh "$HOST" "curl -sf http://localhost:$PORT/node/info | jq -r .id" || echo "")
        echo "peer_id=$PEER_ID" >> "$GITHUB_OUTPUT"
        echo "$NAME peer ID: $PEER_ID"
