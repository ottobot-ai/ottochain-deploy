name: Setup Environment Configuration
description: |
  Configure environment variables and files for a deployment environment.
  Creates .env files with proper credentials and optional token/peer IDs.

inputs:
  environment:
    description: 'Environment name'
    required: true
  keystore_password:
    description: 'CL keystore password'
    required: true
  token_id:
    description: 'Token ID for the metagraph'
    required: false
    default: ''
  gl0_peer_id:
    description: 'GL0 layer peer ID'
    required: false
    default: ''
  ml0_peer_id:
    description: 'ML0 layer peer ID'
    required: false
    default: ''
  env_file:
    description: 'Path to write the .env file'
    required: false
    default: '.env'

outputs:
  config_created:
    description: 'Whether environment config was created'
    value: ${{ steps.create-env.outputs.config_created }}
  env_file_path:
    description: 'Path to created .env file'
    value: ${{ steps.create-env.outputs.env_file_path }}

runs:
  using: composite
  steps:
    - name: Create environment .env file
      id: create-env
      shell: bash
      run: |
        set -euo pipefail
        ENV_FILE="${{ inputs.env_file }}"
        cat > "$ENV_FILE" << EOF
        # Auto-generated by setup-environment composite action
        # Environment: ${{ inputs.environment }}
        # Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

        CL_PASSWORD=${{ inputs.keystore_password }}
        DEPLOY_ENVIRONMENT=${{ inputs.environment }}
        GL0_PEER_ID=${{ inputs.gl0_peer_id }}
        ML0_PEER_ID=${{ inputs.ml0_peer_id }}
        EOF

        chmod 600 "$ENV_FILE"
        echo "✅ Environment config created: $ENV_FILE"
        echo "config_created=true" >> "$GITHUB_OUTPUT"
        echo "env_file_path=$ENV_FILE" >> "$GITHUB_OUTPUT"

    - name: Add optional token ID configuration
      if: ${{ inputs.token_id != '' }}
      shell: bash
      run: |
        ENV_FILE="${{ inputs.env_file }}"
        echo "METAGRAPH_TOKEN_ID=${{ inputs.token_id }}" >> "$ENV_FILE"
        echo "✅ Token ID added to environment config"
