# nginx config for grafana.ottochain.ai
# Managed by deploy — edit this file, not the server.

server {
    listen 80;
    server_name grafana.ottochain.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grafana.ottochain.ai;

    ssl_certificate /etc/letsencrypt/live/grafana.ottochain.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.ottochain.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Block scanners/bots
    include /etc/nginx/snippets/scanner-block.conf;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
