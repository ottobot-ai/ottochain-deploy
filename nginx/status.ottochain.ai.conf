# nginx config for status.ottochain.ai
# Managed by deploy-services.yml — edit this file, not the workflow.
#
# Single catch-all proxy to the monitor service (port 3032).
# The monitor service owns all routing for this domain:
#   /           → dashboard
#   /traffic    → traffic feed
#   /rejections → rejection log
#   /ws         → WebSocket endpoint

server {
    listen 80;
    server_name status.ottochain.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name status.ottochain.ai;

    ssl_certificate /etc/letsencrypt/live/status.ottochain.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/status.ottochain.ai/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3032;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
