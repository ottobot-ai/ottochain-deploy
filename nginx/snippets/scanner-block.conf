# Scanner/bot blocking rules
# Include this in each server block: include /etc/nginx/snippets/scanner-block.conf;

# Block common scanner file extensions
location ~* \.(log|bak|sql|env|git|svn|htaccess|htpasswd|ini|conf|cfg|old|orig|save|swp|dist)$ {
    return 444;
}

# Block common scanner/attack paths
location ~* ^/(\.env|\.git|\.svn|\.hg|wp-admin|wp-login|wp-content|wp-includes|phpmyadmin|pma|myadmin|mysql|cgi-bin|admin|administrator|xmlrpc\.php|readme\.html|license\.txt) {
    return 444;
}
