# nginx config for explorer.ottochain.ai
# Managed by deploy — edit this file, not the server.

server {
    listen 80;
    server_name explorer.ottochain.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name explorer.ottochain.ai;

    ssl_certificate /etc/letsencrypt/live/explorer.ottochain.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.ottochain.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /graphql {
        proxy_pass http://127.0.0.1:4000/graphql;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        root /var/www/ottochain;
        try_files $uri $uri/ /index.html;
    }
}
