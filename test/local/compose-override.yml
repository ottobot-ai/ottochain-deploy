# DinD override: use host networking so inner containers can reach
# other DinD nodes via the outer Docker network (172.28.0.x)
services:
  gl0:
    network_mode: host
    ports: !reset []
  ml0:
    network_mode: host
    ports: !reset []
  dl1:
    network_mode: host
    ports: !reset []
  cl1:
    network_mode: host
    ports: !reset []
