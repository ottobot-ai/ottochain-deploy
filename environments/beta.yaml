# Beta Environment - External testing
# Source: stable releases
# Auto-deploy: manual
#
# Infrastructure stored in secret: BETA_INFRASTRUCTURE

name: beta
mode: release
auto_deploy: false

sources:
  tessellation:
    type: upstream
    repo: Constellation-Labs/tessellation
    ref: main

  ottochain:
    type: core
    repo: scasplte2/ottochain
    ref: main

  sdk:
    type: ecosystem
    repo: ottobot-ai/ottochain-sdk
    ref: main

  services:
    type: ecosystem
    repo: ottobot-ai/ottochain-services
    ref: main

  explorer:
    type: ecosystem
    repo: ottobot-ai/ottochain-explorer
    ref: main

# Infrastructure loaded from secret at runtime
