# Production Environment
# Source: tagged releases only
# Auto-deploy: NEVER (manual approval required)
#
# Infrastructure stored in secret: PROD_INFRASTRUCTURE

name: prod
mode: release
auto_deploy: false
requires_approval: true

sources:
  tessellation:
    type: upstream
    repo: Constellation-Labs/tessellation
    ref: main

  ottochain:
    type: core
    repo: scasplte2/ottochain
    ref: main

  sdk:
    type: ecosystem
    repo: ottobot-ai/ottochain-sdk
    ref: main

  services:
    type: ecosystem
    repo: ottobot-ai/ottochain-services
    ref: main

  explorer:
    type: ecosystem
    repo: ottobot-ai/ottochain-explorer
    ref: main

# Infrastructure loaded from secret at runtime
