# Scratch Environment - Rapid Iteration
# Source: branches (bleeding edge)
# Auto-deploy: on push to develop branches
#
# NOTE: Infrastructure config (IPs) stored in GitHub secret: SCRATCH_INFRASTRUCTURE
# Format: {"nodes": [{"host": "x.x.x.x", "name": "node1"}, ...], "services_host": "x.x.x.x"}

name: scratch
mode: branch
auto_deploy: true

sources:
  tessellation:
    type: upstream
    repo: Constellation-Labs/tessellation
    ref: main
    
  metakit:
    type: upstream
    repo: Constellation-Labs/metakit
    ref: main
    
  ottochain:
    type: core
    repo: scasplte2/ottochain
    ref: develop
    
  sdk:
    type: ecosystem
    repo: ottobot-ai/ottochain-sdk
    ref: develop
    
  services:
    type: ecosystem
    repo: ottobot-ai/ottochain-services
    ref: develop
    
  explorer:
    type: ecosystem
    repo: ottobot-ai/ottochain-explorer
    ref: develop
    
  monitoring:
    type: ecosystem
    repo: ottobot-ai/ottochain-watchdog
    ref: develop

# Infrastructure loaded from secret at runtime
# See: docs/SECRETS.md for setup instructions
