# Explorer - React Frontend
# Usage: docker compose -f compose/base.yml -f compose/services.yml -f compose/explorer.yml up -d

services:
  explorer:
    image: ${EXPLORER_IMAGE:-ghcr.io/ottobot-ai/ottochain-explorer:latest}
    container_name: explorer
    restart: unless-stopped
    ports:
      - "${EXPLORER_PORT:-8081}:80"
    networks:
      - ottochain
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ottochain:
    external: true
