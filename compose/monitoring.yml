# Monitoring stack - Prometheus, Alertmanager, Grafana
# Usage: docker compose -f compose/base.yml -f compose/monitoring.yml up -d
#
# REQUIRES: Clone ottochain-monitoring alongside this repo:
#   git clone https://github.com/ottobot-ai/ottochain-monitoring.git ../ottochain-monitoring
#
# Or set MONITORING_PATH to point to your clone:
#   MONITORING_PATH=/path/to/ottochain-monitoring docker compose -f compose/monitoring.yml up -d

x-monitoring-path: &monitoring-path ${MONITORING_PATH:-../ottochain-monitoring}

services:
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ${MONITORING_PATH:-../ottochain-monitoring}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${MONITORING_PATH:-../ottochain-monitoring}/prometheus/alert_rules:/etc/prometheus/alert_rules:ro
      - ${MONITORING_PATH:-../ottochain-monitoring}/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    depends_on:
      - alertmanager
    networks:
      - ottochain
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ${MONITORING_PATH:-../ottochain-monitoring}/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ${MONITORING_PATH:-../ottochain-monitoring}/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://${ALERT_EXTERNAL_HOST:-localhost}:9093'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ${MONITORING_PATH:-../ottochain-monitoring}/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

  health-monitor:
    image: ghcr.io/ottobot-ai/ottochain-health-monitor:${HEALTH_MONITOR_VERSION:-latest}
    container_name: health-monitor
    restart: unless-stopped
    ports:
      - "${HEALTH_MONITOR_PORT:-3032}:3032"
    environment:
      - NODE_IPS=${NODE_IPS:-}
      - NODE_NAMES=${NODE_NAMES:-node1,node2,node3}
      - SSH_KEY_PATH=/home/monitor/.ssh/id_rsa
      - SSH_USER=${SSH_USER:-root}
      - SNAPSHOT_STALL_MINUTES=${SNAPSHOT_STALL_MINUTES:-4}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-60}
      - RESTART_COOLDOWN_MINUTES=${RESTART_COOLDOWN_MINUTES:-10}
      - MAX_RESTARTS_PER_HOUR=${MAX_RESTARTS_PER_HOUR:-6}
    volumes:
      - ${SSH_KEY_PATH:-~/.ssh/hetzner_ottobot}:/home/monitor/.ssh/id_rsa:ro
    networks:
      - monitoring

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  ottochain:
    external: true
  monitoring:
    driver: bridge
