# Application services - Gateway, Bridge, Indexer, Monitor
# Usage: docker compose -f compose/base.yml -f compose/services.yml up -d
#
# The ottochain-services Docker image uses the SERVICE env var to select
# which package to run. All services share the same image.

x-service-common: &service-common
  image: ${SERVICES_IMAGE:-ghcr.io/ottobot-ai/ottochain-services:latest}
  restart: unless-stopped
  networks:
    - ottochain
  environment: &service-env
    NODE_ENV: ${NODE_ENV:-production}
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    METAGRAPH_ML0_URL: ${METAGRAPH_ML0_URL:-${ML0_URL:-http://host.docker.internal:9200}}
    METAGRAPH_DL1_URL: ${METAGRAPH_DL1_URL:-${DL1_URL:-http://host.docker.internal:9400}}
    METAGRAPH_DL1_URLS: ${METAGRAPH_DL1_URLS:-}
    GL0_URL: ${GL0_URL:-http://host.docker.internal:9000}
    METAGRAPH_ID: ${METAGRAPH_ID:-}

services:
  gateway:
    <<: *service-common
    container_name: gateway
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      <<: *service-env
      SERVICE: gateway
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  bridge:
    <<: *service-common
    container_name: bridge
    ports:
      - "${BRIDGE_PORT:-3030}:3030"
    environment:
      <<: *service-env
      SERVICE: bridge
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3030/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  indexer:
    <<: *service-common
    container_name: indexer
    ports:
      - "${INDEXER_PORT:-3031}:3031"
    environment:
      <<: *service-env
      SERVICE: indexer
      INDEXER_PORT: 3031
      INDEXER_CALLBACK_URL: ${INDEXER_CALLBACK_URL:-http://indexer:3031/webhook/snapshot}
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3031/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  status:
    <<: *service-common
    container_name: status
    ports:
      - "${MONITOR_PORT:-3032}:3032"
    environment:
      <<: *service-env
      SERVICE: monitor
      MONITOR_AUTH: ${MONITOR_AUTH:-false}
      GL0_URLS: ${GL0_URLS:-${GL0_URL:-http://host.docker.internal:9000}}
      ML0_URLS: ${ML0_URLS:-${METAGRAPH_ML0_URL:-http://host.docker.internal:9200}}
      DL1_URLS: ${DL1_URLS:-${METAGRAPH_DL1_URL:-http://host.docker.internal:9400}}
      BRIDGE_URL: http://bridge:3030
      GATEWAY_URL: http://gateway:4000
      TRAFFIC_GEN_URL: http://traffic-gen:3033
      INDEXER_URL: http://indexer:3031
      EXPLORER_URL: http://explorer:80
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3032/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ottochain:
    external: true
