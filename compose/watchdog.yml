# Self-healing watchdog. Reads health from Redis/Postgres, SSH restarts nodes.
# Usage: docker compose -f compose/base.yml -f compose/watchdog.yml up -d

services:
  watchdog:
    image: ghcr.io/ottobot-ai/ottochain-watchdog:${WATCHDOG_VERSION:-latest}
    container_name: ottochain-watchdog
    restart: unless-stopped
    environment:
      - NODE_IPS=${NODE_IPS:?NODE_IPS must be set - comma-separated metagraph node IPs}
      - NODE_NAMES=${NODE_NAMES:-node1,node2,node3}
      - SSH_KEY_PATH=/home/watchdog/.ssh/id_rsa
      - SSH_USER=${SSH_USER:-root}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ottochain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ottochain}
      - HEALTH_DATA_STALE_SECONDS=${HEALTH_DATA_STALE_SECONDS:-60}
      - SNAPSHOT_STALL_MINUTES=${SNAPSHOT_STALL_MINUTES:-4}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-60}
      - RESTART_COOLDOWN_MINUTES=${RESTART_COOLDOWN_MINUTES:-10}
      - MAX_RESTARTS_PER_HOUR=${MAX_RESTARTS_PER_HOUR:-6}
    volumes:
      - ${SSH_KEY_PATH:-~/.ssh/hetzner_ottobot}:/home/watchdog/.ssh/id_rsa:ro
    depends_on:
      - redis
      - postgres
    networks:
      - ottochain
      - monitoring

networks:
  ottochain:
    external: true
  monitoring:
    external: true
