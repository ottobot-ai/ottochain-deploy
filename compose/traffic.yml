# Traffic generator - For testing/load simulation
# Usage: docker compose -f compose/base.yml -f compose/services.yml -f compose/traffic.yml up -d

services:
  traffic-gen:
    image: ${SERVICES_IMAGE:-ghcr.io/ottobot-ai/ottochain-services:latest}
    container_name: traffic-gen
    restart: unless-stopped
    environment:
      SERVICE: traffic-generator
      NODE_ENV: ${NODE_ENV:-production}
      BRIDGE_URL: http://bridge:3030
      METAGRAPH_ML0_URL: ${METAGRAPH_ML0_URL:-${ML0_URL:-http://host.docker.internal:9200}}
      ML0_URL: ${METAGRAPH_ML0_URL:-${ML0_URL:-http://host.docker.internal:9200}}
      METAGRAPH_DL1_URL: ${METAGRAPH_DL1_URL:-${DL1_URL:-http://host.docker.internal:9400}}
      METAGRAPH_DL1_URLS: ${METAGRAPH_DL1_URLS:-}
      GL0_URL: ${GL0_URL:-http://host.docker.internal:9000}
      INDEXER_URL: http://indexer:3031
      DATABASE_URL: ${DATABASE_URL}
      TRAFFIC_INTERVAL: ${TRAFFIC_INTERVAL:-5000}
      TRAFFIC_BATCH_SIZE: ${TRAFFIC_BATCH_SIZE:-3}
    depends_on:
      - bridge
      - indexer
    networks:
      - ottochain

networks:
  ottochain:
    external: true
