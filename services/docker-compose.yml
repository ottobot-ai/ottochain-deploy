version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ottochain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ottochain}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ottochain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bridge:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - VERSION=${VERSION:-0.0.0}
    restart: unless-stopped
    environment:
      - PORT=3030
      # Multi-node URLs for failover/load-balancing
      - GL0_URLS=http://node1:9000,http://node2:9000,http://node3:9000
      - ML0_URLS=http://node1:9200,http://node2:9200,http://node3:9200
      - DL1_URLS=http://node1:9400,http://node2:9400,http://node3:9400
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ottochain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ottochain}
      - GIT_SHA=${GIT_SHA:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    ports:
      - "3030:3030"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "node1:${NODE1_IP:-node1}"
      - "node2:${NODE2_IP:-node2}"
      - "node3:${NODE3_IP:-node3}"

  indexer:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - VERSION=${VERSION:-0.0.0}
    restart: unless-stopped
    command: ["node", "packages/indexer/dist/index.js"]
    environment:
      - PORT=3031
      # Multi-node URLs for failover/load-balancing
      - GL0_URLS=http://node1:9000,http://node2:9000,http://node3:9000
      - ML0_URLS=http://node1:9200,http://node2:9200,http://node3:9200
      - DL1_URLS=http://node1:9400,http://node2:9400,http://node3:9400
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ottochain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ottochain}
      - REDIS_URL=redis://redis:6379
      - GIT_SHA=${GIT_SHA:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    ports:
      - "3031:3031"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "node1:${NODE1_IP:-node1}"
      - "node2:${NODE2_IP:-node2}"
      - "node3:${NODE3_IP:-node3}"

  gateway:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - VERSION=${VERSION:-0.0.0}
    restart: unless-stopped
    command: ["node", "packages/gateway/dist/index.js"]
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ottochain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ottochain}
      - REDIS_URL=redis://redis:6379
      - GIT_SHA=${GIT_SHA:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  monitor:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - VERSION=${VERSION:-0.0.0}
    restart: unless-stopped
    command: ["node", "packages/monitor/dist/index.js"]
    environment:
      # Metagraph nodes (all 3 nodes for failover/load-balancing)
      - GL0_URLS=http://node1:9000,http://node2:9000,http://node3:9000
      - ML0_URLS=http://node1:9200,http://node2:9200,http://node3:9200
      - DL1_URLS=http://node1:9400,http://node2:9400,http://node3:9400
      # Services (internal docker network)
      - BRIDGE_URL=http://bridge:3030
      - INDEXER_URL=http://indexer:3031
      - GATEWAY_URL=http://gateway:4000
      - TRAFFIC_GEN_URL=http://traffic-gen:3033
      # Settings
      - POLL_INTERVAL_MS=10000
      - MONITOR_PORT=3032
      - MONITOR_AUTH=false
      # Debug/version info (passed through from build or runtime)
      - GIT_SHA=${GIT_SHA:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
      - DEBUG=${DEBUG:-false}
    ports:
      - "3032:3032"
    depends_on:
      - bridge
      - indexer
      - gateway
    extra_hosts:
      - "node1:${NODE1_IP:-node1}"
      - "node2:${NODE2_IP:-node2}"
      - "node3:${NODE3_IP:-node3}"

  traffic-gen:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - GIT_SHA=${GIT_SHA:-unknown}
        - BUILD_TIME=${BUILD_TIME:-unknown}
        - VERSION=${VERSION:-0.0.0}
    restart: unless-stopped
    command: ["node", "packages/traffic-generator/dist/index.js"]
    environment:
      # Mode and targets
      - MODE=${TRAFFIC_GEN_MODE:-standard}
      - TARGET_TPS=${TRAFFIC_GEN_TARGET_TPS:-5}
      - TARGET_POPULATION=${TRAFFIC_GEN_TARGET_POPULATION:-100}
      # Endpoints
      - BRIDGE_URL=http://bridge:3030
      - ML0_URL=http://node1:9200
      # Status server port
      - STATUS_PORT=3033
      # Debug
      - GIT_SHA=${GIT_SHA:-unknown}
      - BUILD_TIME=${BUILD_TIME:-unknown}
    ports:
      - "3033:3033"
    profiles:
      - traffic
    depends_on:
      - bridge
    extra_hosts:
      - "node1:${NODE1_IP:-node1}"
      - "node2:${NODE2_IP:-node2}"
      - "node3:${NODE3_IP:-node3}"

volumes:
  postgres_data:
