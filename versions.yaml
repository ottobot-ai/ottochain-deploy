# OttoChain Ecosystem Versions
# ============================
# Single source of truth for all component versions.
# Changes trigger compatibility validation and deployment workflows.
#
# Lifecycle:
#   1. Tag release in component repo (e.g., ottochain-services v0.4.0)
#   2. CI builds/pushes artifact (Docker image or JAR)
#   3. version-bump.yml updates this file automatically
#   4. Merge triggers deploy-on-merge.yml → deploys to scratch env

# Last updated: 2026-03-12
# Updated by: @main (scratch deploy catchup — services 0.10.0, explorer 0.7.0, SDK 1.4.0)

# === Component Versions ===
components:
  # OttoChain metagraph (Scala) - builds JARs
  ottochain:
    version: "0.7.12"
    repo: "scasplte2/ottochain"
  # Tessellation SDK version (external dependency)
  tessellation:
    version: "4.0.0-rc.10"
    repo: "Constellation-Labs/tessellation"
  # OttoChain SDK (TypeScript) - published to npmjs.com as @ottochain/sdk
  sdk:
    version: "1.4.0"
    repo: "ottobot-ai/ottochain-sdk"
    package: "@ottochain/sdk"
    registry: "https://registry.npmjs.org"
  # OttoChain Services (TypeScript) - Docker image
  services:
    version: "0.11.0"
    repo: "ottobot-ai/ottochain-services"
    image: "ghcr.io/ottobot-ai/ottochain-services"
  # OttoChain Explorer (TypeScript) - Docker image
  explorer:
    version: "0.7.0"
    repo: "ottobot-ai/ottochain-explorer"
    image: "ghcr.io/ottobot-ai/ottochain-explorer"
  # OttoChain Watchdog (condition detection & auto-restart)
  watchdog:
    version: "1.2.5"
    repo: "ottobot-ai/ottochain-watchdog"
    image: "ghcr.io/ottobot-ai/ottochain-watchdog"
# === Monitoring Tool Versions ===
monitoring_tools:
  prometheus: "v2.50.0"
  alertmanager: "v0.27.0"
  grafana: "10.3.1"
  loki: "2.9.4"
  promtail: "2.9.4"
  node_exporter: "v1.7.0"
  postgres_exporter: "v0.15.0"
  redis_exporter: "v1.56.0"
# === Infrastructure ===
infra:
  postgres: "16-alpine"
  redis: "7-alpine"
  java: "21"
# === Deployment Environments ===
environments:
  scratch:
    auto_deploy: true
    cluster: hetzner
  staging:
    auto_deploy: false
    cluster: hetzner
  production:
    auto_deploy: false
    cluster: null
# === Deployed State (updated by CI after successful deploy) ===
deployed:
